<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九辰物理治療所 · 治療師後台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
  --bg:#F4F6F3;--white:#FFFFFF;--border:#E4E6E2;
  --text:#1A1C19;--text2:#5A5E57;--text3:#9A9E97;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.07);
  --new-color:#BA7517;--new-bg:#FAEEDA;
  --return-color:#0F6E56;--return-bg:#E1F5EE;
  --cell-h:52px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;user-select:none;}

.header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;}
.header-title{font-size:15px;font-weight:600;}
.header-sub{font-size:11px;color:var(--text3);}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.view-btn{padding:6px 14px;font-size:12px;cursor:pointer;background:var(--white);color:var(--text3);border:none;font-family:inherit;}
.view-btn.active{background:var(--green);color:white;font-weight:500;}

.th-tabs{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;overflow-x:auto;}
.th-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;background:var(--white);color:var(--text2);}
.th-tab.active{font-weight:500;}

.date-bar{padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.date-bar-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
.date-bar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.nav-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);}
.nav-btn:hover{background:var(--bg);}
.date-label{font-size:14px;font-weight:600;flex:1;}
.today-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--white);color:var(--text2);font-family:inherit;}
.refresh-btn{font-size:11px;padding:4px 10px;border:1px solid var(--green);border-radius:20px;cursor:pointer;background:var(--green-light);color:var(--green-dark);font-family:inherit;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px;}
.stat{background:var(--white);border-radius:10px;padding:10px 12px;box-shadow:var(--shadow);}
.stat-n{font-size:22px;font-weight:700;}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px;}

/* Day list */
.appt-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:80px;}
.appt-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border-left:4px solid transparent;cursor:pointer;}
.appt-card.new{border-left-color:var(--new-color);}
.appt-card.return{border-left-color:var(--green);}
.appt-card.cancelled{opacity:0.5;}
.appt-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.appt-time{font-size:15px;font-weight:700;}
.appt-name{font-size:15px;font-weight:600;flex:1;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge.new{background:var(--new-bg);color:var(--new-color);}
.badge.return{background:var(--return-bg);color:var(--return-color);}
.badge.cancelled{background:var(--bg);color:var(--text3);}
.appt-detail{font-size:12px;color:var(--text3);display:flex;gap:12px;}
.appt-actions{display:flex;gap:6px;margin-top:10px;}
.act-btn{flex:1;padding:7px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;font-weight:500;}
.act-btn:hover{background:var(--border);}
.act-btn.danger{color:#E53935;border-color:#FFCDD2;background:#FFF5F5;}
.act-btn.success{color:var(--green-dark);border-color:var(--green-light);background:var(--green-light);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* DRAG WEEK VIEW */
.week-outer{padding:0 16px 80px;overflow-x:auto;}
.week-container{display:grid;grid-template-columns:52px repeat(7,1fr);min-width:620px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}

.week-hdr-corner{background:var(--bg);border-bottom:1px solid var(--border);}
.week-hdr{background:var(--bg);padding:8px 4px;text-align:center;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);border-left:1px solid var(--border);}
.week-hdr.today-hdr{color:var(--green);font-weight:700;}
.week-hdr .day-num{font-size:15px;font-weight:700;display:block;}

.time-col{font-size:10px;color:var(--text3);text-align:right;padding-right:6px;height:var(--cell-h);display:flex;align-items:flex-start;padding-top:4px;border-bottom:1px solid var(--border);}

.week-cell{
  height:var(--cell-h);
  border-bottom:1px solid var(--border);
  border-left:1px solid var(--border);
  position:relative;
  transition:background 0.1s;
}
.week-cell.today-col{background:#F0FBF622;}
.week-cell.drag-over{background:#E1F5EE !important;}

/* Appointment block */
.appt-block{
  position:absolute;
  left:2px;right:2px;top:2px;bottom:2px;
  border-radius:6px;
  padding:3px 5px;
  font-size:10px;
  cursor:grab;
  display:flex;flex-direction:column;justify-content:center;
  transition:opacity 0.15s, box-shadow 0.15s;
  z-index:2;
  touch-action:none;
}
.appt-block:hover{box-shadow:0 2px 8px rgba(0,0,0,0.2);z-index:3;}
.appt-block.dragging{opacity:0.4;cursor:grabbing;}
.appt-block.new-type{background:var(--new-bg);color:var(--new-color);border:1px solid #F5C67A;}
.appt-block.return-type{background:var(--return-bg);color:var(--return-color);border:1px solid #A5D6C4;}
.appt-block b{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.appt-block span{font-size:9px;opacity:0.8;}

/* Ghost during drag */
.drag-ghost{
  position:fixed;
  pointer-events:none;
  z-index:999;
  border-radius:6px;
  padding:4px 6px;
  font-size:10px;
  font-weight:700;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  min-width:80px;
  opacity:0.9;
}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1A1C19;color:white;padding:10px 20px;border-radius:20px;
  font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;}
.modal-lbl{color:var(--text3);}
.modal-val{font-weight:500;text-align:right;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.mBtn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;}
.mBtn.primary{background:var(--green);border-color:var(--green);color:white;}
.mBtn.danger{color:#E53935;border-color:#FFCDD2;background:#FFF5F5;}

.loading{text-align:center;padding:40px;color:var(--text3);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">九</div>
    <div>
      <div class="header-title">治療師後台</div>
      <div class="header-sub">九辰物理治療所</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button onclick="setPage('calendar')" id="btnCalPage" style="padding:6px 12px;border-radius:8px;border:none;background:var(--green);color:white;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">📅 日曆</button>
    <button onclick="setPage('patients')" id="btnPatientsPage" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">👥 病人</button>
    <div class="view-toggle" id="viewToggle">
      <button class="view-btn active" id="btnDay" onclick="setView('day')">日</button>
      <button class="view-btn" id="btnWeek" onclick="setView('week')">週</button>
      <button class="view-btn" id="btnMonth" onclick="setView('month')">月</button>
    </div>
  </div>
</div>

<div class="th-tabs" id="thTabs"></div>
<div class="date-bar">
  <button class="nav-btn" onclick="navigate(-1)">‹</button>
  <span class="date-label" id="dateLabel" onclick="openDatePicker()" style="cursor:pointer;display:flex;align-items:center;gap:4px"></span>
  <button class="nav-btn" onclick="navigate(1)">›</button>
  <button class="today-btn" onclick="goToday()">今天</button>
  <button class="refresh-btn" onclick="loadData()">重新整理</button>
  <button onclick="openNewAppt()" style="padding:6px 14px;border-radius:20px;border:none;background:var(--green);color:white;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">＋ 新增預約</button>
</div>
<div class="stats" id="statsRow"></div>
<div id="mainContent"></div>
<div id="modalArea"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vmkdawpukwpsifqguljy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZta2Rhd3B1a3dwc2lmcWd1bGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjE2MDUsImV4cCI6MjA5NTQzNzYwNX0.hq8rbjKe3NOUhV1sbViBtuQLSzQuWCnK1_4QSrCy2xM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAYS = ['日','一','二','三','四','五','六'];
const TIMES = ['09:00','09:30','10:00','10:30','11:00','11:30','13:30','14:00','14:30','15:00','15:30','16:00'];
const TH_COLORS = ['#1D9E75','#185FA5','#534AB7','#BA7517'];
const TH_BGS = ['#E1F5EE','#E6F1FB','#EEEDFE','#FAEEDA'];

function thColor(t){ return t.color||'#1D9E75'; }
function thBg(t){
  // Convert hex to light bg version
  const c=t.color||'#1D9E75';
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `rgba(${r},${g},${b},0.12)`;
}
function thText(t){
  const c=t.color||'#1D9E75';
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  // Darken for text
  return `rgb(${Math.round(r*0.6)},${Math.round(g*0.6)},${Math.round(b*0.6)})`;
}

let therapists=[], appointments=[];
let curThId=0, curView='day', curDate=new Date();

// Drag state
let dragApptId=null, dragGhost=null, lastDropCell=null;

function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getWeekStart(d){const s=new Date(d);s.setDate(d.getDate()-d.getDay());return s;}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

const BODY_PARTS = ['頸部','肩部','腰部','膝蓋','上肢','下肢','其他'];
let curPage = 'calendar';
let patients = [];
let patientFilter = '';
let partFilter = '';

function setPage(page){
  curPage = page;
  document.getElementById('btnCalPage').style.cssText='padding:6px 12px;border-radius:8px;border:none;background:'+(page==='calendar'?'var(--green)':'var(--white)')+';color:'+(page==='calendar'?'white':'var(--text2)')+';font-size:12px;font-weight:600;cursor:pointer;font-family:inherit';
  document.getElementById('btnPatientsPage').style.cssText='padding:6px 12px;border-radius:8px;border:'+(page==='patients'?'none':'1px solid var(--border)')+';background:'+(page==='patients'?'var(--green)':'var(--white)')+';color:'+(page==='patients'?'white':'var(--text2)')+';font-size:12px;font-weight:500;cursor:pointer;font-family:inherit';
  document.getElementById('viewToggle').style.display=page==='calendar'?'flex':'none';
  document.getElementById('thTabs').style.display=page==='calendar'?'flex':'none';
  const dateBar=document.querySelector('.date-bar');
  if(dateBar)dateBar.style.display=page==='calendar'?'flex':'none';
  const statsRow=document.getElementById('statsRow');
  if(statsRow)statsRow.style.display=page==='calendar'?'grid':'none';
  if(page==='patients') renderPatients();
  else loadData();
}

let _searchTimer=null;
function debouncedSearch(val){
  patientFilter=val;
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>{
    // 只更新清單，不重建整個頁面
    const filtered=patients.filter(p=>{
      const nm=!patientFilter||p.name.includes(patientFilter)||(p.phone&&p.phone.includes(patientFilter));
      const pm=!partFilter||(p.body_parts&&p.body_parts.includes(partFilter));
      return nm&&pm;
    });
    const listEl=document.getElementById('pt-list');
    if(!listEl)return;
    document.getElementById('pt-count').textContent=`共 ${filtered.length} 位病人`;
    listEl.innerHTML=filtered.length?filtered.map(p=>`
      <div onclick="openPatientDetail(${p.id})" style="background:var(--white);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0">${p.name[0]}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:600;margin-bottom:4px">${p.name}</div>
          <div style="font-size:12px;color:var(--text3)">${p.phone||'無電話'}${p.first_visit?' · 初診：'+p.first_visit:''}</div>
          ${p.body_parts&&p.body_parts.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${p.body_parts.map(bp=>`<span style="background:var(--green-light);color:var(--green-dark);border-radius:20px;padding:2px 8px;font-size:10px">${bp}</span>`).join('')}</div>`:''}
        </div>
        <span style="color:var(--text3);font-size:18px">›</span>
      </div>`).join('')
    :`<div style="text-align:center;padding:40px;color:var(--text3)">找不到符合的病人</div>`;
  }, 400);
}

async function loadPatients(){
  const{data}=await sb.from('patients').select('*').order('name');
  if(data)patients=data;
}

function renderPatients(){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  loadPatients().then(()=>{
    const filtered=patients.filter(p=>{
      const nameMatch=!patientFilter||p.name.includes(patientFilter)||( p.phone&&p.phone.includes(patientFilter));
      const partMatch=!partFilter||(p.body_parts&&p.body_parts.includes(partFilter));
      return nameMatch&&partMatch;
    });

    el.innerHTML=`<div style="padding:0 16px 80px">
      <!-- Search + filter -->
      <div style="background:var(--white);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <input id="ptSearch" placeholder="搜尋姓名或電話..." value="${patientFilter}" oninput="debouncedSearch(this.value)" style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;outline:none">
          <button onclick="openNewPatient()" style="padding:8px 14px;background:var(--green);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">＋ 新增</button>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <div onclick="partFilter='';renderPatients()" style="padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;background:${!partFilter?'var(--green)':'var(--bg)'};color:${!partFilter?'white':'var(--text2)'}">全部</div>
          ${BODY_PARTS.map(p=>`<div onclick="partFilter='${p}';renderPatients()" style="padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;background:${partFilter===p?'var(--green)':'var(--bg)'};color:${partFilter===p?'white':'var(--text2)'}">${p}</div>`).join('')}
        </div>
      </div>

      <!-- Patient count -->
      <div id="pt-count" style="font-size:12px;color:var(--text3);margin-bottom:10px">共 ${filtered.length} 位病人</div>

      <!-- Patient cards -->
      <div id="pt-list">
      ${filtered.length?filtered.map(p=>`
        <div onclick="openPatientDetail(${p.id})" style="background:var(--white);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0">${p.name[0]}</div>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:600;margin-bottom:4px">${p.name}</div>
            <div style="font-size:12px;color:var(--text3)">${p.phone||'無電話'}${p.first_visit?' · 初診：'+p.first_visit:''}</div>
            ${p.body_parts&&p.body_parts.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${p.body_parts.map(bp=>`<span style="background:var(--green-light);color:var(--green-dark);border-radius:20px;padding:2px 8px;font-size:10px">${bp}</span>`).join('')}</div>`:''}
          </div>
          <span style="color:var(--text3);font-size:18px">›</span>
        </div>`).join('')
      :`<div style="text-align:center;padding:40px;color:var(--text3)">找不到符合的病人</div>`}
      </div>
    </div>`;
  });
}

function openNewPatient(){
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <p class="modal-title">新增病人資料</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">姓名 *</label>
          <input id="np-name" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit" placeholder="">
        </div>
        <div>
          <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">電話</label>
          <input id="np-phone" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit" placeholder="">
        </div>
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:6px">治療部位（可多選）</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="np-parts">
          ${BODY_PARTS.map(p=>`<div onclick="npTogglePart('${p}')" id="np-part-${p}" style="padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg)">${p}</div>`).join('')}
        </div>
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">初診日期</label>
        <input id="np-first" type="date" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit">
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">備註</label>
        <textarea id="np-note" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;resize:vertical;min-height:60px" placeholder="過敏、慢性病、特殊注意事項..."></textarea>
      </div>
      <div class="modal-btns">
        <button class="mBtn" onclick="closeModal()">取消</button>
        <button class="mBtn primary" onclick="submitNewPatient()">儲存</button>
      </div>
    </div>
  </div>`;
  window._npParts=[];
}

function npTogglePart(p){
  if(!window._npParts)window._npParts=[];
  const idx=window._npParts.indexOf(p);
  if(idx>=0)window._npParts.splice(idx,1);else window._npParts.push(p);
  const el=document.getElementById('np-part-'+p);
  const sel=window._npParts.includes(p);
  el.style.cssText=`padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid ${sel?'var(--green)':'var(--border)'};background:${sel?'var(--green-light)':'var(--bg)'};color:${sel?'var(--green-dark)':'var(--text)'}`;
}

async function submitNewPatient(){
  const name=document.getElementById('np-name').value.trim();
  if(!name){showToast('請填寫姓名');return;}
  const{error}=await sb.from('patients').insert([{
    name,
    phone:document.getElementById('np-phone').value.trim()||null,
    body_parts:window._npParts||[],
    first_visit:document.getElementById('np-first').value||null,
    note:document.getElementById('np-note').value.trim()||null
  }]);
  if(!error){closeModal();showToast('✅ 病人資料已儲存');renderPatients();}

}

function epTogglePart(bp){
  if(!window._editParts)window._editParts=[];

  if(idx>=0)window._editParts.splice(idx,1);else window._editParts.push(bp);

}

async function savePatient(id){
  const name=document.getElementById('ep-name').value.trim();
  const phone=document.getElementById('ep-phone').value.trim();
  const first=document.getElementById('ep-first').value;
  const note=document.getElementById('ep-note').value.trim();
  if(!name){showToast('姓名不能空白');return;}
  const{error}=await sb.from('patients').update({
    name, phone:phone||null,
    body_parts:window._editParts||[],
    first_visit:first||null,
    note:note||null
  }).eq('id',id);
  if(!error){closeModal();showToast('✅ 病人資料已更新');renderPatients();}
  else showToast('儲存失敗：'+error.message);
}

async function deletePatient(id){
  if(!confirm('確定刪除此病人資料？'))return;
  await sb.from('patients').delete().eq('id',id);
  closeModal();showToast('已刪除');renderPatients();
}

async function loadData(){
  const{data:ths}=await sb.from('therapists').select('*').order('id');
  if(ths)therapists=ths;
  let startDate,endDate;
  if(curView==='day'){startDate=endDate=fmtDate(curDate);}
  else if(curView==='week'){
    const ws=getWeekStart(curDate);
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    startDate=fmtDate(ws);endDate=fmtDate(we);
  } else {
    // month: load entire month + buffer
    const first=new Date(curDate.getFullYear(),curDate.getMonth(),1);
    const last=new Date(curDate.getFullYear(),curDate.getMonth()+1,0);
    startDate=fmtDate(first);endDate=fmtDate(last);
  }
  const{data:appts}=await sb.from('appointments').select('*')
    .gte('appointment_date',startDate).lte('appointment_date',endDate)
    .order('appointment_date').order('appointment_time');
  if(appts)appointments=appts;
  render();
}

function setView(v){
  curView=v;
  document.getElementById('btnDay').className='view-btn'+(v==='day'?' active':'');
  document.getElementById('btnWeek').className='view-btn'+(v==='week'?' active':'');
  document.getElementById('btnMonth').className='view-btn'+(v==='month'?' active':'');
  loadData();
}
function navigate(dir){
  if(curView==='day')curDate=new Date(curDate.getFullYear(),curDate.getMonth(),curDate.getDate()+dir);
  else if(curView==='week')curDate=new Date(curDate.getFullYear(),curDate.getMonth(),curDate.getDate()+dir*7);
  else curDate=new Date(curDate.getFullYear(),curDate.getMonth()+dir,1);
  loadData();
}
function goToday(){curDate=new Date();loadData();}

function render(){
  renderThTabs();renderDateLabel();renderStats();
  if(curView==='day')renderDay();
  else if(curView==='week')renderWeek();
  else renderMonth();
}

function renderThTabs(){
  document.getElementById('thTabs').innerHTML=`
    <button class="th-tab ${curThId===0?'active':''}" style="${curThId===0?'border-color:var(--green);background:var(--green-light);color:var(--green-dark)':''}" onclick="selectTh(0)">全部</button>
    ${therapists.map(t=>`<button class="th-tab ${curThId===t.id?'active':''}" style="${curThId===t.id?`border-color:${thColor(t)};background:${thBg(t)};color:${thText(t)}`:''}" onclick="selectTh(${t.id})">${t.name}</button>`).join('')}`;
}
function selectTh(id){curThId=id;render();}

function renderDateLabel(){
  let txt='';
  if(curView==='day'){const d=curDate;txt=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）`;}
  else if(curView==='week'){const ws=getWeekStart(curDate);const we=new Date(ws);we.setDate(ws.getDate()+6);txt=`${ws.getMonth()+1}/${ws.getDate()} – ${we.getMonth()+1}/${we.getDate()}`;}
  else{txt=`${curDate.getFullYear()}年${curDate.getMonth()+1}月`;}
  document.getElementById('dateLabel').innerHTML=`<span>${txt}</span><span style="font-size:10px;color:var(--text3)">▼</span>`;
}

function getFiltered(dateStr){
  return appointments.filter(a=>{
    const dm=dateStr?a.appointment_date===dateStr:true;
    const tm=curThId===0||a.therapist_id===curThId;
    return dm&&tm;
  });
}

function renderStats(){
  const ds=curView==='day'?fmtDate(curDate):null;
  const f=getFiltered(ds).filter(a=>a.status!=='cancelled');
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-n">${f.length}</div><div class="stat-l">${curView==='day'?'今日':'本週'}預約</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--new-color)">${f.filter(a=>a.type==='new').length}</div><div class="stat-l">初診</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${f.filter(a=>a.type==='return').length}</div><div class="stat-l">回診</div></div>`;
}

// Color logic:
// - Assigned therapist + new = therapist color + 初 badge
// - Assigned therapist + return = therapist color
// - Unassigned + new = orange (new-color)
// - Unassigned + return = green (return-color)
function thCode(a){
  if(!a.therapist_id) return '未指定';
  const t=therapists.find(x=>x.id===a.therapist_id);
  if(!t) return '未指定';
  return t.code || t.name.slice(-1);
}

function apptBg(a){
  if(a.therapist_id){const t=therapists.find(x=>x.id===a.therapist_id);if(t)return thBg(t);}
  return '#FFF9E0'; // 不指定初診 -> 黃色
}
function apptColor(a){
  if(a.therapist_id){const t=therapists.find(x=>x.id===a.therapist_id);if(t)return thText(t);}
  return '#B8860B';
}
function apptBorder(a){
  if(a.therapist_id){const t=therapists.find(x=>x.id===a.therapist_id);if(t)return thColor(t);}
  return '#D4A800';
}
function apptLabel(a){
  if(a.type==='new') return '初';
  return '';
}

function getThName(id){if(!id)return'不指定';const t=therapists.find(x=>x.id===id);return t?t.name+' 治療師':'不指定';}
function getThColorById(id){const t=therapists.find(x=>x.id===id);return t?thColor(t):'#888';}
function getThBgById(id){const t=therapists.find(x=>x.id===id);return t?thBg(t):'#eee';}

function renderDay(){
  const ds=fmtDate(curDate);
  const dayAppts=getFiltered(ds).filter(a=>a.status!=='cancelled').sort((a,b)=>a.appointment_time.localeCompare(b.appointment_time));
  const el=document.getElementById('mainContent');

  // Build time axis + appointment blocks (left) + list (right)
  let timeRows='';
  TIMES.forEach(t=>{
    const slotsAtTime=dayAppts.filter(a=>a.appointment_time.slice(0,5)===t);
    const w=slotsAtTime.length>0?Math.floor(100/slotsAtTime.length):100;
    let slotsHtml='';
    if(slotsAtTime.length===0){
      slotsHtml=`<div style="width:100%;height:100%;cursor:pointer;" onclick="openNewApptAt('${ds}','${t}')"></div>`;
    } else {
      slotsAtTime.forEach((slot,si)=>{
        slotsHtml+=`<div draggable="true" data-id="${slot.id}" 
          ondragstart="onDragStart(event,${slot.id})" ondragend="onDragEnd(event)"
          onclick="openModal(${slot.id})" 
          style="position:absolute;left:${si*w}%;width:${w}%;top:2px;bottom:2px;background:${apptBg(slot)};color:${apptColor(slot)};border-radius:6px;padding:4px 8px;cursor:grab;border-left:3px solid ${apptBorder(slot)};overflow:hidden">
          <div style="font-size:12px;font-weight:600">${thCode(slot)?thCode(slot)+"-":""} ${slot.patient_name} ${apptLabel(slot)?`<span style="font-size:9px;font-weight:700;background:rgba(0,0,0,0.12);border-radius:4px;padding:1px 4px;margin-left:3px">${apptLabel(slot)}</span>`:''}</div>
          <div style="font-size:11px;opacity:0.8">${slot.service||''} ${slot.symptoms?'・'+slot.symptoms:''}</div>
        </div>`;
      });
    }
    timeRows+=`<div style="display:flex;border-bottom:1px solid var(--border);min-height:52px;">
      <div style="width:52px;flex-shrink:0;font-size:10px;color:var(--text3);text-align:right;padding:4px 6px 0 0;border-right:1px solid var(--border)">${t}</div>
      <div style="flex:1;position:relative;padding:2px;" 
        onclick="if(!event.target.closest('[data-id]'))openNewApptAt('${ds}','${t}')"
        ondragover="event.preventDefault();this.style.background='var(--green-light)'"
        ondragleave="this.style.background=''"
        ondrop="this.style.background='';onCellDrop(event,'${ds}','${t}')">
        ${slotsHtml}
      </div>
    </div>`;
  });

  // Right panel: appointment list
  const listHtml=dayAppts.length?dayAppts.map(a=>`
    <div onclick="openModal(${a.id})" style="border-left:3px solid ${apptBorder(a)};background:var(--white);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);border-top:1px solid ${apptBg(a)};border-right:1px solid ${apptBg(a)};border-bottom:1px solid ${apptBg(a)}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:14px;font-weight:700">${a.appointment_time.slice(0,5)}</span>
        <span style="font-size:14px;font-weight:600;flex:1">${thCode(a)?thCode(a)+"-":""} ${a.patient_name}</span>
        <span class="badge ${a.type}">${a.type==='new'?'初診':'回診'}</span>
      </div>
      <div style="font-size:12px;color:var(--text3)">📞 ${a.patient_phone}${a.symptoms?' · '+a.symptoms:''}</div>
    </div>`).join('')
  :`<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">今日無預約</div>`;

  el.innerHTML=`<div id="day-layout" style="display:grid;grid-template-columns:1fr 280px;gap:16px;padding:0 16px 80px;align-items:start">
    <!-- 時間軸 -->
    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;background:var(--bg);display:flex;align-items:center;justify-content:space-between">
        <span>時間軸</span>
        <button onclick="toggleDaySidebar()" id="sidebarToggle" style="border:none;background:var(--green-light);color:var(--green-dark);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit">
          隱藏清單 ›
        </button>
      </div>
      ${timeRows}
    </div>
    <!-- 預約清單 -->
    <div id="day-sidebar">
      <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;padding:10px 12px;background:var(--white);border-radius:var(--radius);border:1px solid var(--border)">
        今日預約 <span style="color:var(--green);font-size:15px;font-weight:700">${dayAppts.length}</span> 筆

function toggleDaySidebar(){
  const layout=document.getElementById('day-layout');
  const sidebar=document.getElementById('day-sidebar');
  const btn=document.getElementById('sidebarToggle');
  if(sidebar.style.display==='none'){
    sidebar.style.display='block';
    layout.style.gridTemplateColumns='1fr 280px';
    btn.textContent='隱藏清單 ›';
  } else {
    sidebar.style.display='none';
    layout.style.gridTemplateColumns='1fr';
    btn.textContent='‹ 顯示清單';
  }
}


function renderMonth(){
  const year=curDate.getFullYear(), month=curDate.getMonth();
  const first=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=fmtDate(new Date());
  let html=`<div style="padding:0 16px 80px"><div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
      ${DAYS.map(d=>`<div style="text-align:center;padding:8px 4px;font-size:11px;color:var(--text3);background:var(--bg)">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr)">`;
  
  let cells=first+daysInMonth;
  let total=Math.ceil(cells/7)*7;
  for(let i=0;i<total;i++){
    const dayNum=i-first+1;
    const valid=dayNum>=1&&dayNum<=daysInMonth;
    const d=valid?new Date(year,month,dayNum):null;
    const ds=d?fmtDate(d):'';
    const isToday=ds===todayStr;
    const isSun=d&&d.getDay()===0;
    const dayAppts=valid?appointments.filter(a=>a.appointment_date===ds&&a.status!=='cancelled'&&(curThId===0||a.therapist_id===curThId)):[];
    html+=`<div style="min-height:90px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:4px;${isToday?'background:#F0FBF6':''}${isSun?'background:#FFF8F8':''}">`;
    if(valid){
      html+=`<div style="font-size:12px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--green)':isSun?'#E53935':'var(--text)'};margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:${isToday?'var(--green)':'transparent'};color:${isToday?'white':isSun?'#E53935':'var(--text)'}">${dayNum}</div>`;
      dayAppts.slice(0,3).forEach(a=>{
        html+=`<div onclick="openModal(${a.id})" style="background:${apptBg(a)};color:${apptColor(a)};border-radius:4px;padding:2px 5px;font-size:10px;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${thCode(a)?thCode(a)+"-":""} ${a.patient_name}${a.type==='new'?' 初':''} ${a.appointment_time.slice(0,5)}</div>`;
      });
      if(dayAppts.length>3)html+=`<div style="font-size:10px;color:var(--text3);padding:1px 4px">還有 ${dayAppts.length-3} 個</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div></div></div>`;
  document.getElementById('mainContent').innerHTML=html;
}

function renderWeek(){
  const ws=getWeekStart(curDate);
  const todayStr=fmtDate(new Date());
  let html=`<div class="week-outer"><div class="week-container">
    <div class="week-hdr-corner"></div>
    ${Array.from({length:7},(_,i)=>{
      const d=new Date(ws);d.setDate(ws.getDate()+i);
      const isToday=fmtDate(d)===todayStr;
      return `<div class="week-hdr ${isToday?'today-hdr':''}"><span>${DAYS[d.getDay()]}</span><span class="day-num">${d.getDate()}</span></div>`;
    }).join('')}`;

  TIMES.forEach((t,ti)=>{
    html+=`<div class="time-col">${t}</div>`;
    for(let i=0;i<7;i++){
      const d=new Date(ws);d.setDate(ws.getDate()+i);
      const ds=fmtDate(d);
      const isToday=ds===todayStr;

      // Get ALL appointments for this cell (multiple therapists)
      const slots=appointments.filter(a=>
        a.appointment_date===ds&&
        a.appointment_time.slice(0,5)===t&&
        a.status!=='cancelled'&&
        (curThId===0||a.therapist_id===curThId)
      );

      html+=`<div class="week-cell ${isToday?'today-col':''}" data-date="${ds}" data-time="${t}" 
        ondragover="onCellDragOver(event)" ondragleave="onCellDragLeave(event)" ondrop="onCellDrop(event,'${ds}','${t}')"
        onclick="onCellClick(event,'${ds}','${t}')">`;

      if(slots.length>0){
        const w=Math.floor(100/slots.length);
        slots.forEach((slot,si)=>{
          const thStyle=`background:${apptBg(slot)};color:${apptColor(slot)};border:1px solid ${apptBorder(slot)}`;
          html+=`<div class="appt-block" style="${thStyle};position:absolute;left:${si*w+1}%;width:${w-1}%;top:2px;bottom:2px;right:auto;" 
            draggable="true"
            data-id="${slot.id}"
            ondragstart="onDragStart(event,${slot.id})"
            ondragend="onDragEnd(event)"
            onclick="openModal(${slot.id})">
            <b>${thCode(slot)?thCode(slot)+"-":""} ${slot.patient_name}${slot.type==='new'?' 初':''}</b>
            <span>${slot.appointment_time.slice(0,5)}</span>
          </div>`;
        });
      }
      html+=`</div>`;
    }
  });
  html+=`</div></div>`;
  document.getElementById('mainContent').innerHTML=html;
}

// ── DRAG & DROP ──
function onDragStart(e, id){
  dragApptId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(()=>{
    const el=e.target;
    if(el)el.classList.add('dragging');
  },0);

  // Create ghost
  const a=appointments.find(x=>x.id===id);
  if(a){
    dragGhost=document.createElement('div');
    dragGhost.className='drag-ghost';
    dragGhost.style.cssText=`background:${apptBg(a)};color:${apptColor(a)};border:1px solid ${apptBorder(a)};`;
    dragGhost.textContent=a.patient_name;
    document.body.appendChild(dragGhost);
    e.dataTransfer.setDragImage(dragGhost,-999,-999);
  }

  document.addEventListener('dragover',updateGhostPos);
}

function updateGhostPos(e){
  if(dragGhost){
    dragGhost.style.left=(e.clientX+12)+'px';
    dragGhost.style.top=(e.clientY-20)+'px';
  }
}

function onDragEnd(e){
  document.querySelectorAll('.appt-block').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.week-cell').forEach(el=>el.classList.remove('drag-over'));
  if(dragGhost){dragGhost.remove();dragGhost=null;}
  document.removeEventListener('dragover',updateGhostPos);
  dragApptId=null;
}

function onCellDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function onCellDragLeave(e){e.currentTarget.classList.remove('drag-over');}

async function onCellDrop(e, newDate, newTime){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragApptId)return;

  const a=appointments.find(x=>x.id===dragApptId);
  if(!a)return;
  if(a.appointment_date===newDate&&a.appointment_time.slice(0,5)===newTime){return;}

  // Check if slot taken
  const taken=appointments.find(x=>
    x.id!==dragApptId&&
    x.appointment_date===newDate&&
    x.appointment_time.slice(0,5)===newTime&&
    x.status!=='cancelled'&&
    (x.therapist_id===a.therapist_id||(!x.therapist_id&&!a.therapist_id))
  );
  if(taken){showToast('⚠️ 此時段已有預約');return;}

  const{error}=await sb.from('appointments').update({
    appointment_date:newDate,
    appointment_time:newTime+':00'
  }).eq('id',dragApptId);

  if(!error){
    showToast(`✅ 已移至 ${newDate.slice(5)} ${newTime}`);
    await loadData();
  }else{
    showToast('❌ 修改失敗');
  }
}

function dpSelectYear(y){
  curDate=new Date(y,curDate.getMonth(),1);
  closeModal();loadData();
}
function dpSelectMonth(m){
  curDate=new Date(curDate.getFullYear(),m,1);
  closeModal();loadData();
}

function openModal(id){
  const a=appointments.find(x=>x.id===id);
  if(!a)return;
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <p class="modal-title">預約詳情</p>
      <div class="modal-row"><span class="modal-lbl">姓名</span><span class="modal-val">${a.patient_name}</span></div>
      <div class="modal-row"><span class="modal-lbl">電話</span><span class="modal-val">${a.patient_phone}</span></div>
      <div class="modal-row"><span class="modal-lbl">日期時間</span><span class="modal-val">${a.appointment_date} ${a.appointment_time.slice(0,5)}</span></div>
      <div class="modal-row"><span class="modal-lbl">治療師</span><span class="modal-val">${getThName(a.therapist_id)}</span></div>

          <button class="mBtn success" onclick="toggleType(${a.id});closeModal()" style="color:var(--green-dark);border-color:var(--green-light);background:var(--green-light)">${a.type==='new'?'改為回診':'改為初診'}</button>
          <button class="mBtn" onclick="closeModal();openReschedule(${a.id})">修改時間</button>

function closeModal(){document.getElementById('modalArea').innerHTML='';}

let reschedApptId=null,reschedDate=null,reschedTime=null,reschedCalMonth=new Date();

function openReschedule(id){
  reschedApptId=id;
  const a=appointments.find(x=>x.id===id);
  reschedDate=new Date(a.appointment_date+'T00:00:00');
  reschedTime=a.appointment_time.slice(0,5);
  reschedCalMonth=new Date(reschedDate);
  renderReschedule();
}

function renderReschedule(){
  const m=reschedCalMonth;
  const year=m.getFullYear(),month=m.getMonth();
  const first=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const fD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const calHtml=`<div style="margin:10px 0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <button class="nav-btn" onclick="rsPrevMonth()">&#8249;</button>
      <span style="font-size:13px;font-weight:600">${year}年${month+1}月</span>
      <button class="nav-btn" onclick="rsNextMonth()">&#8250;</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
      ${DAYS.map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3)">${d}</div>`).join('')}
      ${Array(first).fill('<div></div>').join('')}
      ${Array.from({length:daysInMonth},(_,i)=>{
        const d=new Date(year,month,i+1);
        const bad=d<today||d.getDay()===0;
        const sel=reschedDate&&fD(reschedDate)===fD(d);
        const isT=d.toDateString()===today.toDateString();
        return `<div style="text-align:center;padding:6px 2px;font-size:12px;border-radius:6px;cursor:${bad?'default':'pointer'};background:${sel?'var(--green)':'transparent'};color:${sel?'white':bad?'var(--text3)':isT?'var(--green)':'var(--text)'};font-weight:${sel||isT?600:400}" onclick="${bad?'':'rsSelectDate('+year+','+month+','+(i+1)+')'}">${i+1}</div>`;
      }).join('')}
    </div>
  </div>`;
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <p class="modal-title">修改預約時間</p>
      ${calHtml}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0">
        ${TIMES.map(t=>`<div style="border:1px solid ${reschedTime===t?'var(--green)':'var(--border)'};border-radius:8px;padding:7px 4px;text-align:center;font-size:12px;cursor:pointer;background:${reschedTime===t?'var(--green)':'transparent'};color:${reschedTime===t?'white':'var(--text)'}" onclick="rsSelectTime('${t}')">${t}</div>`).join('')}
      </div>
      <div class="modal-btns">
        <button class="mBtn" onclick="closeModal()">取消</button>
        <button class="mBtn primary" onclick="confirmReschedule()">確認修改</button>
      </div>
    </div>
  </div>`;
}
function rsPrevMonth(){reschedCalMonth=new Date(reschedCalMonth.getFullYear(),reschedCalMonth.getMonth()-1,1);renderReschedule();}
function rsNextMonth(){reschedCalMonth=new Date(reschedCalMonth.getFullYear(),reschedCalMonth.getMonth()+1,1);renderReschedule();}
function rsSelectDate(y,m,d){reschedDate=new Date(y,m,d);renderReschedule();}
function rsSelectTime(t){reschedTime=t;renderReschedule();}
async function confirmReschedule(){
  if(!reschedDate||!reschedTime)return;
  const fD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const{error}=await sb.from('appointments').update({appointment_date:fD(reschedDate),appointment_time:reschedTime+':00'}).eq('id',reschedApptId);
  if(!error){closeModal();showToast('已修改時間');await loadData();}
  else showToast('修改失敗');
}

function naTogglePart(p){
  if(!window._naParts)window._naParts=[];
  const idx=window._naParts.indexOf(p);
  if(idx>=0)window._naParts.splice(idx,1);else window._naParts.push(p);
  const el=document.getElementById('na-p-'+p);
  if(!el)return;
  const sel=window._naParts.includes(p);
  el.style.cssText=`padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid ${sel?'var(--green)':'var(--border)'};background:${sel?'var(--green-light)':'var(--bg)'};color:${sel?'var(--green-dark)':'var(--text)'}`;
}

function onCellClick(e, date, time){
  // Only trigger if clicking empty space (not an appointment block)
  if(e.target.closest('.appt-block')) return;
  openNewApptAt(date, time);
}

function openNewApptAt(date, time){
  window._naType='return';
  window._naParts=[];
  // Pre-select therapist if one is selected in tabs
  const preThId = curThId !== 0 ? curThId : '';
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <p class="modal-title">＋ 新增預約</p>
      <p style="font-size:13px;color:var(--text3);margin-bottom:12px">📅 ${date} ${time}</p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">姓名 *</label>
          <input id="na-name" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit" placeholder="">
        </div>
        <div>
          <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">電話 *</label>
          <input id="na-phone" type="tel" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit" placeholder="">
        </div>
      </div>

      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">類型 *</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div id="na-new" onclick="naSelectType('new')" style="border:1.5px solid var(--border);border-radius:8px;padding:8px;text-align:center;cursor:pointer;font-size:13px">初診</div>
          <div id="na-return" onclick="naSelectType('return')" style="border:1.5px solid var(--green);border-radius:8px;padding:8px;text-align:center;cursor:pointer;background:var(--green-light);color:var(--green-dark);font-size:13px;font-weight:500">複診</div>
        </div>
      </div>

      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">治療師 *</label>
        <select id="na-th" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;appearance:none">
          <option value="">不指定</option>
          ${therapists.map(t=>`<option value="${t.id}" ${t.id==preThId?'selected':''}>${t.name} 治療師</option>`).join('')}
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">日期 *</label>
          <input id="na-date" type="date" value="${date}" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit">
        </div>
        <div>
          <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">時段 *</label>
          <select id="na-time" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;appearance:none">
            ${TIMES.map(t=>`<option value="${t}" ${t===time?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>

      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">治療部位（初診適用）</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px" id="na-parts-wrap">
          ${['頸部','肩部','腰部','膝蓋','上肢','下肢','其他'].map(p=>`<div onclick="naTogglePart('${p}')" id="na-p-${p}" style="padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg)">${p}</div>`).join('')}
        </div>
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">服務項目（複診適用）</label>
        <select id="na-service" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;appearance:none;margin-bottom:8px">
          <option value="複診一個部位">複診一個部位（30 分鐘）</option>
          <option value="複診兩個部位／親友一起約">複診兩個部位／親友一起約（60 分鐘）</option>
        </select>
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">備註</label>
        <input id="na-note" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit" placeholder="例如：術後復健、特殊需求...">
      </div>

      <div class="modal-btns">

      </div>
    </div>
  </div>`;
}

function openNewAppt(){
  openNewApptAt(fmtDate(curDate), TIMES[0]);
}

function naSelectType(t){
  window._naType=t;
  document.getElementById('na-new').style.cssText=`border:1.5px solid ${t==='new'?'var(--green)':'var(--border)'};border-radius:8px;padding:8px;text-align:center;cursor:pointer;background:${t==='new'?'var(--green-light)':'transparent'};color:${t==='new'?'var(--green-dark)':'var(--text)'};font-size:13px;font-weight:${t==='new'?'500':'400'}`;
  document.getElementById('na-return').style.cssText=`border:1.5px solid ${t==='return'?'var(--green)':'var(--border)'};border-radius:8px;padding:8px;text-align:center;cursor:pointer;background:${t==='return'?'var(--green-light)':'transparent'};color:${t==='return'?'var(--green-dark)':'var(--text)'};font-size:13px;font-weight:${t==='return'?'500':'400'}`;
}

function getNextTimeSlot(t){
  const TIMES=['09:00','09:30','10:00','10:30','11:00','11:30','13:30','14:00','14:30','15:00','15:30','16:00'];
  const idx=TIMES.indexOf(t);
  if(idx>=0&&idx<TIMES.length-1)return TIMES[idx+1];
  return null;
}

async function submitNewAppt(){
  const name=document.getElementById('na-name').value.trim();
  const phone=document.getElementById('na-phone').value.trim();
  const thId=document.getElementById('na-th').value;
  const date=document.getElementById('na-date').value;
  const time=document.getElementById('na-time').value;
  const note=document.getElementById('na-note').value.trim();
  if(!name||!phone||!date||!time){showToast('請填寫必填欄位');return;}

  const service=window._naType==='new'?'初診評估':(document.getElementById('na-service')?.value||'複診一個部位');
  const is60=service.includes('兩個部位');
  const nextTime=is60?getNextTimeSlot(time):null;

  const{data:appt,error}=await sb.from('appointments').insert([{
    therapist_id:thId?parseInt(thId):null,
    patient_name:name,
    patient_phone:phone,
    appointment_date:date,
    appointment_time:time+':00',
    type:window._naType||'return',
    service:service,
    symptoms:note,
    note:'',
    status:'confirmed'
  }]).select().single();

  if(error){showToast('新增失敗：'+error.message);return;}

  // 60分鐘自動建立第二時段
  if(is60&&nextTime){
    await sb.from('appointments').insert([{
      therapist_id:thId?parseInt(thId):null,
      patient_name:name,
      patient_phone:phone,
      appointment_date:date,
      appointment_time:nextTime+':00',
      type:window._naType||'return',
      service:service+'（續）',
      symptoms:note,
      note:'（60分鐘第二時段）',
      status:'confirmed'
    }]);
  }

  // 初診時自動建立病人資料
  if(window._naType==='new'){
    const{data:existing}=await sb.from('patients').select('id').eq('phone',phone).maybeSingle();
    if(!existing){
      await sb.from('patients').insert([{
        name,phone,
        body_parts:window._naParts&&window._naParts.length?window._naParts:[],
        first_visit:date,
        note:note||null
      }]);
    }
  }

  closeModal();showToast('✅ 預約已新增，病人資料自動儲存');await loadData();
}

async function toggleType(id){
  const a=appointments.find(x=>x.id===id);
  if(!a)return;
  await sb.from('appointments').update({type:a.type==='new'?'return':'new'}).eq('id',id);
  showToast('已更新類型');await loadData();
}
async function cancelAppt(id){
  if(!confirm('確定要取消這個預約嗎？'))return;
  await sb.from('appointments').update({status:'cancelled'}).eq('id',id);
  showToast('已取消預約');await loadData();
}
async function restoreAppt(id){
  await sb.from('appointments').update({status:'confirmed'}).eq('id',id);
  showToast('已恢復預約');await loadData();
}

document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
loadData();
</script>
