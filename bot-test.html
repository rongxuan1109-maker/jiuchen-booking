<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九辰客服機器人 · 測試</title>
<style>
  :root{--warm:#c08a52;--ink:#2a1d12;--bot:#fff;--me:#dcf0d8;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans TC","PingFang TC",sans-serif;background:#e9e2d4;}
  .wrap{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:#ece5d8;}
  header{background:var(--ink);color:#fff;padding:14px 16px;text-align:center;}
  header b{color:var(--warm);}
  header small{display:block;color:#bbb;font-size:11px;margin-top:2px;}
  #log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .bot{background:var(--bot);align-self:flex-start;border-top-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .me{background:var(--me);align-self:flex-end;border-top-right-radius:4px;}
  .tip{align-self:center;font-size:11px;color:#8a7f72;background:#f3ede1;padding:5px 10px;border-radius:10px;text-align:center;}
  .typing{color:#8a7f72;font-style:italic;}
  .linkbtn{display:inline-block;margin-top:8px;background:var(--warm);color:#fff !important;text-decoration:none;padding:9px 16px;border-radius:18px;font-size:13px;font-weight:500;}
  footer{display:flex;gap:8px;padding:10px;background:#ddd4c4;}
  #q{flex:1;border:1px solid #c9bda8;border-radius:20px;padding:11px 15px;font-size:16px;outline:none;font-family:inherit;}
  #send{background:var(--warm);color:#fff;border:none;border-radius:20px;padding:0 18px;font-size:14px;cursor:pointer;}
  #send:disabled{opacity:.5;}
</style>
</head>
<body>
<div class="wrap">
  <header><b>九辰物理治療所</b> 客服小幫手<small>🤖 測試版</small></header>
  <div id="log">
    <div class="msg bot">嗨～我是九辰的線上小幫手 🙂
營業時間、收費、初診要帶什麼都能問我；
複診想「約時間、改時間、取消」也可以直接跟我說，我幫您處理～
有什麼需要,直接打字就好！</div>
    <div class="tip">測試版｜可試：「禮拜六早上有空嗎」「我要改時間」「幫我取消預約」</div>
  </div>
  <footer>
    <input id="q" placeholder="輸入訊息…" autocomplete="off">
    <button id="send">送出</button>
  </footer>
</div>
<script>
const API = "https://vmkdawpukwpsifqguljy.supabase.co/functions/v1/clinic-bot";
const CALL = "https://vmkdawpukwpsifqguljy.supabase.co/functions/v1/call-staff";
// ⚠️ 測試用：暫時綁定院長本人 LINE 身分，讓網頁測試也能收到漂亮預約通知。正式上線/同事測試前要拿掉。
const TEST_LINE_ID = "U6de9099563aed38d74a21f3076de659e";
const log = document.getElementById('log');
const q = document.getElementById('q');
const send = document.getElementById('send');
let history = [];
let lastUserMsg = "";
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function botHtml(t){
  let h = esc(t).replace(/\n/g,'<br>');
  h = h.replace(/https?:\/\/[^\s<)）]+/g, m=>{
    const label = m.indexOf('consult-form')>-1 ? '📝 填症狀諮詢表單'
                : (m.indexOf('jiuchen-booking')>-1 ? '📅 點這裡查詢可預約時段' : '🔗 點這裡開啟');
    return `<a class="linkbtn" href="${m}" target="_blank">${label}</a>`;
  });
  return h;
}
function add(text, cls){
  const isBot = cls.indexOf('bot')>-1 && cls.indexOf('typing')<0;
  const hasCall = isBot && text.indexOf('[[CALL_STAFF]]')>-1;
  const clean = text.replace('[[CALL_STAFF]]','').trim();
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  if(isBot) d.innerHTML = botHtml(clean); else d.textContent = clean;
  log.appendChild(d);
  if(hasCall){
    const b = document.createElement('button');
    b.className='linkbtn'; b.style.border='none'; b.style.cursor='pointer'; b.style.alignSelf='flex-start';
    b.textContent='🔔 請治療師回覆我';
    b.onclick=async ()=>{
      b.disabled=true; b.textContent='通知中…';
      try{ await fetch(CALL,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({lastMessage:lastUserMsg})}); }catch(e){}
      const t=document.createElement('div'); t.className='tip';
      t.textContent='✅ 已通知治療師，請稍等～若正在忙可能晚一點回覆 🙏';
      b.replaceWith(t); log.scrollTop=log.scrollHeight;
    };
    log.appendChild(b);
  }
  log.scrollTop = log.scrollHeight; return d;
}
async function ask(){
  const text = q.value.trim(); if(!text) return;
  q.value=''; send.disabled=true; q.disabled=true;
  lastUserMsg = text;
  add(text,'me'); history.push({role:'user',content:text});
  const typing = add('輸入中…','bot typing');
  try{
    const r = await fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({messages:history,lineUserId:TEST_LINE_ID})});
    const d = await r.json();
    const reply = d.reply || '不好意思，系統忙線中，請稍後再試 🙏';
    typing.remove(); add(reply,'bot');
    history.push({role:'assistant',content:reply.replace('[[CALL_STAFF]]','').trim()});
  }catch(e){ typing.remove(); add('⚠️ 連線錯誤，請稍後再試','bot'); }
  send.disabled=false; q.disabled=false; q.focus();
}
send.onclick = ask;
q.addEventListener('keydown', e=>{ if(e.key==='Enter') ask(); });
</script>
</body>
</html>
