<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="九辰後台">
<meta name="color-scheme" content="light only">
<title>九辰物理治療所 · 治療師後台</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 44 44' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='44' height='44' fill='%232a1d12'/%3E%3Cpath d='M22 6C22 6 27 15 27 22C27 29 22 38 22 38C22 38 17 29 17 22C17 15 22 6 22 6Z' stroke='%23c08a52' stroke-width='1.8' fill='none'/%3E%3Cpath d='M6 22C6 22 15 17 22 17C29 17 38 22 38 22C38 22 29 27 22 27C15 27 6 22 6 22Z' stroke='%23c08a52' stroke-width='1.8' fill='none'/%3E%3Ccircle cx='22' cy='22' r='2.5' fill='%23c08a52' opacity='.7'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light only;
  /* 暖色系重新對應 — JS inline styles 繼續使用舊變數名稱，只改值 */
  --green:#c08a52;
  --green-dark:#7a5638;
  --green-light:#f0e7d8;
  --bg:#ffffff;
  --white:#ffffff;
  --border:rgba(60,46,32,.16);
  --text:#1c1611;
  --text2:#5a4126;
  --text3:#7a6a55;
  --new-color:#d96e28;
  --new-bg:rgba(217,110,40,.13);
  --return-color:#7a5638;
  --return-bg:#f0e7d8;
  --radius:4px;
  --shadow:0 2px 14px rgba(40,30,20,.08);
  /* 額外暖色變數 */
  --ink:#1c1611;
  --paper:#ffffff;
  --warm:#c08a52;
  --accent:#6b4a2a;
  --muted:#8a7a64;
  --glow:#f2e9da;
  --surface:#ffffff;
  --deep:#2a1d12;
  --grid:rgba(0,0,0,.07);
  /* 統計框底色（預設極淡粉，使用者可用色票覆蓋、存 localStorage） */
  --stat-bg:#fef8fa; --stat-fg:#bf7889; --stat-bd:#f9edf0; --stat-num:#b06378;
}
/* 深色模式（仿 Google App 黑底）：只覆蓋變數值 */
body.dark{
  --bg:#1b1b1d; --white:#27272a; --surface:#27272a; --paper:#27272a;
  --border:rgba(255,255,255,.14); --grid:rgba(255,255,255,.10);
  --text:#e8e6e3; --text2:#c8c2b8; --text3:#9a9286;
  --ink:#f1efec; --muted:#9b9384; --glow:#34302b; --accent:#e0c39a;
  --new-bg:rgba(217,110,40,.22); --return-bg:#3a322a; --shadow:0 2px 14px rgba(0,0,0,.5);
  background:#1b1b1d;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#ffffff;overflow-x:clip;max-width:100vw;}
html.dark{background:#1b1b1d !important;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;user-select:none;
  overflow-x:clip;max-width:100vw;   /* clip 比 hidden 更徹底防水平溢出/橫向飄 */
}

/* ── LOGIN SCREEN ── */
#loginScreen{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:500;flex-direction:column;gap:0;
}
.login-box{
  width:100%;max-width:340px;
  padding:40px 32px;
  background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  text-align:center;
}
.login-emblem{
  width:64px;height:64px;border-radius:50%;border:1px solid var(--warm);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  animation:breathe 5s ease-in-out infinite;
}
.login-emblem svg{width:30px;height:30px;}
@keyframes breathe{
  0%,100%{box-shadow:0 0 0 0 rgba(192,138,82,.2)}
  50%{box-shadow:0 0 0 10px rgba(192,138,82,0)}
}
.login-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;
  color:var(--ink);letter-spacing:1px;margin-bottom:4px;
}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:28px;}
.login-input{
  width:100%;border:none;
  border-bottom:1px solid var(--border);
  padding:10px 2px;font-size:15px;
  font-family:'Noto Sans TC',sans-serif;
  background:transparent;color:var(--ink);
  outline:none;text-align:center;
  letter-spacing:4px;margin-bottom:24px;
  transition:border-color .2s;
}
.login-input:focus{border-bottom-color:var(--warm);}
.login-btn{
  width:100%;background:var(--warm);color:#fff;
  border:none;padding:14px;
  font-family:'Noto Sans TC',sans-serif;
  font-size:13px;letter-spacing:2px;cursor:pointer;
  position:relative;overflow:hidden;transition:all .3s;
}
.login-btn::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,.18);
  transform:translateX(-101%);
  transition:transform .4s cubic-bezier(.7,0,.3,1);
}
.login-btn:hover::before{transform:translateX(0);}
.login-btn span{position:relative;z-index:1;}
.login-err{font-size:12px;color:var(--new-color);margin-top:10px;min-height:18px;}

/* ── HEADER ── */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  padding-top:calc(10px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
/* 加到主畫面(standalone)時，狀態列/動態島會蓋住內容，強制給足上方間距避免標題被切 */
@media all and (display-mode:standalone){
  .header{padding-top:max(calc(10px + env(safe-area-inset-top)), 56px)!important;}
}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--warm);
  display:flex;align-items:center;justify-content:center;
  animation:breathe 5s ease-in-out infinite;
}
.logo svg{width:18px;height:18px;}
.logo{border-color:rgba(42,29,18,.3);}
.header-title{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:400;color:var(--ink);letter-spacing:1px;
}
.header-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;}
.view-toggle{display:flex;border:1px solid rgba(192,138,82,.3);overflow:hidden;}
.view-btn{
  padding:5px 12px;font-size:12px;cursor:pointer;
  background:transparent;color:var(--muted);border:none;
  font-family:'Noto Sans TC',sans-serif;
  transition:all .2s;letter-spacing:.5px;
}
.view-btn.active{background:var(--warm);color:#f3ede1;}

/* ── THERAPIST TABS ── */
.th-tabs{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:9px 16px;display:flex;gap:7px;overflow-x:auto;
}
.th-tab{
  padding:5px 13px;
  border:1px solid var(--border);border-radius:10px;
  font-size:12px;cursor:pointer;white-space:nowrap;
  font-family:'Noto Sans TC',sans-serif;background:var(--surface);color:var(--text2);
  transition:all .2s;font-weight:300;
}
.th-tab.active{font-weight:400;}

/* ── DATE BAR ── */
.date-bar{
  padding:9px 16px;display:flex;
  align-items:center;gap:7px;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.date-bar-left{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.date-bar-center{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;min-width:0;}
.date-bar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.nav-btn{
  width:28px;height:28px;
  border:1px solid var(--border);border-radius:10px;cursor:pointer;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);transition:all .2s;
}
.nav-btn:hover{border-color:var(--warm);color:var(--warm);}
.date-label{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:400;
  color:var(--ink);letter-spacing:.5px;
}
.today-btn{
  font-size:11px;padding:4px 10px;
  border:1px solid var(--border);border-radius:10px;cursor:pointer;
  background:var(--surface);color:var(--muted);
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
  font-weight:300;
}
.today-btn:hover{border-color:var(--warm);color:var(--warm);}
.refresh-btn{
  font-size:11px;padding:4px 10px;
  border:1px solid var(--border);border-radius:10px;cursor:pointer;
  background:var(--glow);color:var(--accent);
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
}
.refresh-btn:hover{border-color:var(--warm);}

/* ── STATS（橫的扁長條，跟按鈕同高，極淡粉底可換色）── */
.stats{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;}
.stat{
  display:inline-flex;align-items:center;gap:5px;height:26px;
  padding:0 10px;box-sizing:border-box;
  background:var(--stat-bg);
  border:1px solid var(--stat-bd);border-radius:7px;
  color:var(--stat-fg);font-size:11px;white-space:nowrap;
}
.stat-n{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:500;color:var(--stat-num);line-height:1;
}
.stat-l{font-size:11px;color:var(--stat-fg);font-weight:300;}
/* 統計框換色：縮成小點，不佔位 */
.stat-swatch{width:11px;height:11px;border-radius:50%;border:1px solid var(--border);cursor:pointer;padding:0;flex-shrink:0;opacity:.7;}
.stat-swatch:hover{opacity:1;}
.stat-swatch.cur{outline:2px solid var(--warm);outline-offset:1px;border-radius:50%;}

/* ── 第 2 行：工作列（治療師＋統計＋動作鍵 併一橫排，壓扁）── */
.workbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:5px 16px;display:flex;align-items:center;gap:9px;
  flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.workbar .wb-label{font-size:10px;color:var(--muted);font-weight:300;letter-spacing:.5px;flex-shrink:0;}
.workbar .wb-spacer{flex:1;min-width:8px;}
.workbar .wb-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.workbar .th-tabs{background:none;border:none;padding:0;flex-shrink:0;}

/* ── DAY LIST ── */
.appt-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:80px;}
.appt-card{
  background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  border-left:3px solid transparent;
  padding:13px;cursor:pointer;
  transition:border-color .2s;
}
.appt-card.new{border-left-color:var(--new-color);}
.appt-card.return{border-left-color:var(--green);}
.appt-card.cancelled{opacity:.4;}
.appt-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.appt-time{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:400;color:var(--ink);
}
.appt-name{font-size:14px;font-weight:400;flex:1;}
.badge{font-size:10px;padding:2px 9px;font-weight:500;letter-spacing:.5px;border-radius:10px;}
.badge.new{background:var(--new-color);color:#fff;}
.badge.return{background:var(--return-color);color:#fff;}
.badge.cancelled{background:var(--muted);color:#fff;}
/* 全域圓角：按鈕、輸入框、下拉一律修圓角，避免四四方方 */
button{border-radius:8px;}
input,select,textarea{border-radius:8px;}
.appt-detail{font-size:12px;color:var(--muted);display:flex;gap:12px;font-weight:300;}
.appt-actions{display:flex;gap:6px;margin-top:10px;}
.act-btn{
  flex:1;padding:7px;font-size:12px;cursor:pointer;
  border:1px solid var(--border);border-radius:10px;background:var(--bg);
  color:var(--text2);font-family:'Noto Sans TC',sans-serif;
  transition:all .2s;font-weight:300;
}
.act-btn:hover{border-color:var(--warm);}
.act-btn.danger{color:var(--new-color);border-color:rgba(217,110,40,.3);background:rgba(217,110,40,.05);}
.act-btn.success{color:var(--accent);border-color:var(--border);background:var(--glow);}
.empty{text-align:center;padding:44px 20px;color:var(--muted);}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.5;}

/* ── WEEK VIEW ── */
.week-outer{padding:0 12px 20px;overflow-x:auto;}
.week-container{
  display:grid;
  grid-template-columns:46px repeat(7,1fr);
  min-width:620px;
  background:var(--surface);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
}
.week-hdr-corner{background:var(--bg);border-bottom:1px solid var(--border);}
.week-hdr{
  background:var(--bg);padding:7px 4px;
  text-align:center;font-size:11px;color:var(--muted);
  border-bottom:1px solid var(--border);border-left:1px solid var(--border);
  font-weight:300;
}
.week-hdr.today-hdr{color:var(--warm);font-weight:500;}
.week-hdr .day-num{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:400;display:block;
}
.time-col{
  font-size:10px;color:var(--muted);text-align:right;
  padding-right:5px;height:52px;
  display:flex;align-items:flex-start;padding-top:4px;
  border-bottom:1px solid var(--border);font-weight:300;
}
.week-cell{
  height:52px;
  border-bottom:1px solid var(--border);
  border-left:1px solid var(--border);
  position:relative;transition:background .1s;
}
.week-cell.today-col{background:rgba(192,138,82,.04);}
.week-cell.drag-over{background:var(--glow) !important;}

/* ── APPOINTMENT BLOCK ── */
.appt-block{
  position:absolute;
  padding:3px 7px;font-size:13px;cursor:grab;border-radius:7px;
  display:flex;flex-direction:column;justify-content:flex-start;gap:1px;
  transition:opacity .15s,box-shadow .15s,transform .12s;z-index:2;
  touch-action:none;overflow:hidden;line-height:1.3;
  border:1px solid rgba(255,255,255,.35);box-shadow:inset 4px 0 0 #e53935,0 1px 3px rgba(28,22,17,.22);
}
.appt-block:hover{box-shadow:inset 4px 0 0 #e53935,0 4px 16px rgba(28,22,17,.45);}
.appt-block.dragging{opacity:.4;cursor:grabbing;}
.appt-block b{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.appt-block>span{font-size:11px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
/* 週檢視欄位窄：字級縮小、內距收緊、紅條變細，讓名字多顯示 */
.week-outer .appt-block{padding:2px 5px;box-shadow:inset 3px 0 0 #e53935,0 1px 3px rgba(28,22,17,.22);}
.week-outer .appt-block b{font-size:11px;}
.week-outer .appt-block>span{font-size:9px;}

/* ── 左側小日曆（可收合：預設收起，點箭頭展開）── */
.mini-panel{width:218px;flex-shrink:0;padding:0 4px 0 16px;transition:width .2s ease,padding .2s ease,opacity .15s;overflow:hidden;}
#calGrid.mini-collapsed .mini-panel{width:0;padding:0;opacity:0;pointer-events:none;}
.mini-day:hover{background:var(--glow);color:var(--accent)!important;}
.cal-scroll{scrollbar-width:thin;}
/* 收合/展開把手：黏在時間軸左緣的小箭頭 */
.mini-toggle{
  flex-shrink:0;align-self:flex-start;margin-top:6px;
  width:16px;height:42px;border:1px solid var(--border);border-radius:0 7px 7px 0;
  background:var(--surface);color:var(--muted);cursor:pointer;
  font-size:11px;line-height:40px;padding:0;text-align:center;transition:all .2s;
}
.mini-toggle:hover{color:var(--warm);border-color:var(--warm);}
@media(max-width:880px){.mini-panel,.mini-toggle{display:none;}}

/* ── DRAG GHOST ── */
.drag-ghost{
  position:fixed;pointer-events:none;z-index:999;
  padding:4px 8px;font-size:11px;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;
  box-shadow:0 4px 16px rgba(28,22,17,.25);
  min-width:80px;opacity:.92;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--deep);color:#f3ede1;
  padding:10px 22px;
  font-size:12px;z-index:200;opacity:0;
  transition:opacity .3s;pointer-events:none;
  letter-spacing:1px;font-family:'Noto Sans TC',sans-serif;
}
.toast.show{opacity:1;}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(28,22,17,.5);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal{
  background:var(--surface);
  border:1px solid var(--border);border-radius:10px;border-radius:10px;
  padding:22px 26px;width:100%;max-width:400px;margin:0 auto;
  max-height:88vh;overflow-y:auto;
  box-shadow:0 12px 48px rgba(28,22,17,.28);
}
.modal-handle{
  width:36px;height:3px;
  background:var(--border);margin:0 auto 16px;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:400;margin-bottom:16px;
  color:var(--ink);letter-spacing:.5px;
}
.modal-row{
  display:flex;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;
}
.modal-lbl{color:var(--muted);font-weight:300;letter-spacing:.3px;}
.modal-val{font-weight:400;text-align:right;color:var(--ink);}
.modal-btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.mBtn{
  flex:1;padding:11px;font-size:12px;font-weight:400;cursor:pointer;
  border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text2);
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
  letter-spacing:.5px;
}
.mBtn:hover{border-color:var(--warm);}
.mBtn.primary{background:var(--ink);border-color:var(--ink);color:#f3ede1;}
.mBtn.primary:hover{background:var(--accent);}
.mBtn.danger{color:var(--new-color);border-color:rgba(217,110,40,.3);background:rgba(217,110,40,.05);}
.mBtn.success{color:var(--accent);border-color:var(--glow);background:var(--glow);}

/* ── 預約資訊小卡（點標籤先跳這個，Google 日曆風；不蓋標籤，放旁邊空白）── */
.appt-pop{position:fixed;z-index:120;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 10px 34px rgba(28,22,17,.22);width:268px;max-width:calc(100vw - 24px);padding:15px 16px 14px;font-size:13px;color:var(--ink);}
.appt-pop .ap-x{position:absolute;top:9px;right:10px;border:none;background:none;color:var(--muted);font-size:15px;cursor:pointer;line-height:1;}
.appt-pop .ap-x:hover{color:var(--ink);}
.appt-pop .ap-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:500;margin:0 22px 9px 0;line-height:1.3;flex-wrap:wrap;}
.appt-pop .ap-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.appt-pop .ap-row{display:flex;align-items:flex-start;gap:9px;color:var(--text2);margin:6px 0;font-weight:300;line-height:1.5;}
.appt-pop .ap-ic{width:15px;flex-shrink:0;text-align:center;color:var(--muted);font-size:13px;margin-top:1px;}
.appt-pop .ap-btns{display:flex;gap:8px;margin-top:13px;}
.appt-pop .ap-btn{flex:1;padding:9px;font-size:12px;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:'Noto Sans TC',sans-serif;letter-spacing:.5px;transition:all .15s;}
.appt-pop .ap-btn:hover{border-color:var(--warm);}
.appt-pop .ap-btn.primary{background:var(--warm);border-color:var(--warm);color:#f3ede1;}
.appt-pop .ap-btn.primary:hover{background:var(--accent);}

const TIMES = (function(){

  let h=parseInt(t.slice(0,2),10);
  let ap = h<6?'凌晨':(h<12?'上午':(h===12?'中午':'下午'));

const TH_COLOR_OVERRIDE={'徐若椏':'#E8710A','張維庭':'#616161','江榮軒':'#039BE5'};
function thColor(t){ return (t&&TH_COLOR_OVERRIDE[t.name])||t.color||'#c08a52'; }
function thBg(t){
  const c=t.color||'#c08a52';
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `rgba(${r},${g},${b},0.24)`;          /* 加深：12% → 24% */
}
function thText(t){
  const c=t.color||'#c08a52';
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `rgb(${Math.round(r*0.42)},${Math.round(g*0.42)},${Math.round(b*0.42)})`;  /* 文字更深 */

// 回傳 true=有抓到新生日資料（需要重畫一次）；false=全都查過了（不必重畫，避免閃爍）
async function loadBirthMonths(){

  const names=[...new Set(appointments.map(a=>a.patient_name).filter(Boolean))].filter(n=>!(n in birthMonthNameMap));
  if(!phones.length&&!names.length)return false;   // 這批病人全都查過了 → 不必重畫
  // 找這些病患的初診預約（分別用電話、姓名比對，再合併）
  let newAppts=[];
  if(phones.length){
    const{data}=await sb.from('appointments').select('id,patient_phone,patient_name').eq('type','new').in('patient_phone',phones);
    if(data)newAppts=newAppts.concat(data);
  }
  if(names.length){
    const{data}=await sb.from('appointments').select('id,patient_phone,patient_name').eq('type','new').in('patient_name',names);
    if(data)newAppts=newAppts.concat(data);
  }
  let added=false;
  if(newAppts.length){
    const seen=new Set();
    newAppts=newAppts.filter(a=>seen.has(a.id)?false:(seen.add(a.id),true));
    const ids=newAppts.map(a=>a.id);
    const metaById=Object.fromEntries(newAppts.map(a=>[a.id,{phone:a.patient_phone,name:a.patient_name}]));
    const{data:forms}=await sb.from('intake_forms').select('appointment_id,birth_date').in('appointment_id',ids).not('birth_date','is',null);
    (forms||[]).forEach(f=>{
      const meta=metaById[f.appointment_id];
      if(!meta||!f.birth_date)return;
      const mo=parseInt(f.birth_date.split('-')[1]);
      if(meta.phone&&!birthMonthMap[meta.phone]){birthMonthMap[meta.phone]=mo;added=true;}
      if(meta.name&&!birthMonthNameMap[meta.name]){birthMonthNameMap[meta.name]=mo;added=true;}
    });
  }
  // 查無生日的病患用 null 佔位，下次就不會再查、也不會再觸發重畫
  phones.forEach(p=>{if(!(p in birthMonthMap))birthMonthMap[p]=null;});
  names.forEach(n=>{if(!(n in birthMonthNameMap))birthMonthNameMap[n]=null;});
  return added;
}

/* ── 農曆 & 節日 ── */
const _LUNAR_DAY=['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
const _LUNAR_MON=['','正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','臘月'];

function getLunar(date){
  try{
    const p=new Intl.DateTimeFormat('zh-TW-u-ca-chinese',{month:'short',day:'numeric'}).formatToParts(date);
    let mo='',dy='';
    p.forEach(x=>{if(x.type==='month')mo=x.value;if(x.type==='day')dy=x.value;});
    // Safari 有時回傳阿拉伯數字，轉換為中文
    const dyN=parseInt(dy);if(!isNaN(dyN)&&dyN>=1&&dyN<=30)dy=_LUNAR_DAY[dyN];
    const moN=parseInt(mo);if(!isNaN(moN)&&moN>=1&&moN<=12)mo=_LUNAR_MON[moN];
    const f={
      '正月初一':'春節','正月初二':'春節','正月初三':'春節',
      '正月十五':'元宵','五月初五':'端午','七月初七':'七夕',
      '七月十五':'中元','八月十五':'中秋','九月初九':'重陽',
      '十二月廿九':'除夕','十二月三十':'除夕',
    };
    return{mo,dy,show:dy==='初一'?mo:dy,fest:f[mo+dy]||null};
  }catch(e){return null;}
}
const _twH={'1/1':'元旦','2/28':'和平','4/4':'清明','4/5':'清明',
            '5/1':'勞動','10/10':'國慶','12/25':'聖誕','12/31':'跨年'};
function twHoliday(date){return _twH[`${date.getMonth()+1}/${date.getDate()}`]||null;}
function isEvent(a){return !!(a.note&&a.note.startsWith('event:'));}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// 某時段(HH:MM)的結束時間 = +30 分
function slotEnd(t){t=t.slice(0,5);let[h,m]=t.split(':').map(Number);m+=30;if(m>=60){m-=60;h++;}return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;}

/* 將同病人連續時段合併成群組，供跨時段方塊使用 */
function groupConsecutiveAppts(appts){
  const sorted=[...appts].sort((a,b)=>a.appointment_time.localeCompare(b.appointment_time));
  const groups=[];const used=new Set();
  for(let i=0;i<sorted.length;i++){
    if(used.has(sorted[i].id))continue;
    const g=[sorted[i]];used.add(sorted[i].id);
    for(let j=i+1;j<sorted.length;j++){
      if(used.has(sorted[j].id))continue;
      const last=g[g.length-1];
      const li=TIMES.indexOf(last.appointment_time.slice(0,5));
      const ni=TIMES.indexOf(sorted[j].appointment_time.slice(0,5));
      if(ni===li+1&&sorted[j].patient_name===last.patient_name&&sorted[j].patient_phone===last.patient_phone&&sorted[j].therapist_id===last.therapist_id){
        g.push(sorted[j]);used.add(sorted[j].id);
      }
    }
    groups.push(g);
  }
  return groups;
}
// Google 風格重疊排版：每個 item 需有 s(起始格),e(結束格)；計算 col(第幾欄)、cols(總欄數)、span(向右擴張幾欄)
function layoutOverlap(items){
  items.sort((a,b)=> a.s-b.s || a.e-b.e);
  let columns=[], lastEnd=null;
  const flush=()=>{
    const n=columns.length;
    columns.forEach((col,ci)=>col.forEach(ev=>{
      ev.col=ci; ev.cols=n;
      let span=1;
      for(let k=ci+1;k<n;k++){
        if(columns[k].some(o=>o!==ev && o.s<ev.e && o.e>ev.s)) break;
        span++;
      }
      ev.span=span;
    }));
    columns=[];
  };
  for(const ev of items){
    if(lastEnd!==null && ev.s>=lastEnd){ flush(); lastEnd=null; }
    let placed=false;
    for(const col of columns){
      if(col[col.length-1].e<=ev.s){ col.push(ev); placed=true; break; }
    }
    if(!placed) columns.push([ev]);
    lastEnd=(lastEnd===null)?ev.e:Math.max(lastEnd,ev.e);
  }
  if(columns.length) flush();
  return items;
}
function lunarLabel(date){

  const holiday=L?.fest||H||'';

}

// 一次性整合：掃描所有預約，把每位病患回填到病患表（不重複建立）
async function integratePatients(){
  if(!confirm('要掃描所有預約、把病患整合建檔嗎？\n（已存在的不會重複，可重複執行）'))return;
  showToast('整合中，請稍候…');
  const{data:appts,error}=await sb.from('appointments').select('patient_name,patient_phone,appointment_date,note,status').limit(10000);
  if(error){showToast('讀取預約失敗：'+error.message);return;}
  const{data:existing}=await sb.from('patients').select('id,name,phone');
  const exPhone=new Set((existing||[]).filter(p=>p.phone).map(p=>p.phone));
  const exName=new Set((existing||[]).map(p=>p.name));
  // 每位病患取最早日期（key=姓名|電話）
  const map={};
  (appts||[]).forEach(a=>{
    if(!a.patient_name||a.status==='cancelled') return;
    if(a.note&&a.note.startsWith('event:')) return;          // 排除活動
    const key=a.patient_name+'|'+(a.patient_phone||'');
    if(!map[key]||a.appointment_date<map[key].first) map[key]={name:a.patient_name,phone:a.patient_phone||'',first:a.appointment_date};
  });
  const toInsert=[];
  Object.values(map).forEach(p=>{
    if(p.phone){ if(exPhone.has(p.phone))return; exPhone.add(p.phone); }
    else { if(exName.has(p.name))return; exName.add(p.name); }
    toInsert.push({name:p.name,phone:p.phone||null,body_parts:[],first_visit:p.first||null,note:null});
  });
  if(!toInsert.length){showToast('沒有需要新增的病患（都已建檔）');renderPatients();return;}
  // 分批插入避免過大
  for(let i=0;i<toInsert.length;i+=200){
    const{error:e}=await sb.from('patients').insert(toInsert.slice(i,i+200));
    if(e){showToast('建立失敗：'+e.message);return;}
  }
  showToast('已整合 '+toInsert.length+' 位病患');
  renderPatients();
}

async function upsertPatient(name, phone, date, parts, note){
  if(!name) return;
  let found=null;
  if(phone){
    const{data}=await sb.from('patients').select('id,phone,first_visit').eq('phone',phone).limit(1);
    if(data&&data[0]) found=data[0];
  }
  if(!found){
    const{data}=await sb.from('patients').select('id,phone,first_visit').eq('name',name).limit(1);
    if(data&&data[0]) found=data[0];
  }
  if(!found){
    await sb.from('patients').insert([{name,phone:phone||null,body_parts:(parts&&parts.length?parts:[]),first_visit:date||null,note:note||null}]);
  } else if(phone&&!found.phone){

  }
}

async function loadPatientVisits(){

  (data||[]).forEach(a=>{

    const keys=[];
    if(a.patient_phone)keys.push('p:'+a.patient_phone);

  });
}

function recencyCutoff(){
  if(!recencyFilter)return null;
  const n=new Date();n.setMonth(n.getMonth()-parseInt(recencyFilter));

}
function patientPassFilters(p){

  const partMatch=!partFilter||(p.body_parts&&p.body_parts.includes(partFilter));
  let recMatch=true;
  if(recencyFilter){const info=patientVisitInfo(p);const cut=recencyCutoff();recMatch=!!(info&&info.last>=cut);}
  return nameMatch&&partMatch&&recMatch;
}
// 相對時間：今天／X天前／X週前／X個月前／X年前
function relTime(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr+'T00:00:00'),now=new Date();
  const days=Math.floor((now-d)/86400000);
  if(days<0)return'未來';
  if(days===0)return'今天';
  if(days===1)return'昨天';
  if(days<7)return days+'天前';
  if(days<14)return'上週';
  if(days<30)return Math.floor(days/7)+'週前';
  if(days<365){const m=Math.floor(days/30);return m+'個月前';}
  const y=Math.floor(days/365),rm=Math.floor((days%365)/30);
  return y+'年'+(rm?rm+'個月':'')+'前';
}
// 相對時間的顏色（越近越亮）
function relColor(dateStr){
  const d=new Date(dateStr+'T00:00:00'),days=Math.floor((new Date()-d)/86400000);
  if(days<30)return'#2e7d32';      // 近1月 綠
  if(days<90)return'#6b4fb0';      // 近3月 紫
  if(days<180)return'#c08a52';     // 近半年 暖
  if(days<365)return'#9b8a74';     // 半年-1年 灰
  return'#bbb';                    // 更早 淺灰
}

// 載入並顯示某病患的所有就診紀錄（用電話/姓名比對）
async function loadPatientHistory(p){
  const el=document.getElementById('pt-history');if(!el)return;
  let rows=[];
  if(p.phone){
    const{data}=await sb.from('appointments').select('appointment_date,appointment_time,type,service,therapist_id,status,note,symptoms').eq('patient_phone',p.phone).limit(500);
    if(data)rows=rows.concat(data);
  }
  const{data:byName}=await sb.from('appointments').select('appointment_date,appointment_time,type,service,therapist_id,status,note,symptoms').eq('patient_name',p.name).limit(500);
  if(byName)rows=rows.concat(byName);
  // 去重 + 排除活動 + 依日期時間新到舊
  const seen=new Set();
  rows=rows.filter(a=>{
    if(a.note&&a.note.startsWith('event:'))return false;
    const k=a.appointment_date+a.appointment_time;if(seen.has(k))return false;seen.add(k);return true;
  }).sort((a,b)=>(b.appointment_date+b.appointment_time).localeCompare(a.appointment_date+a.appointment_time));
  if(!rows.length){el.innerHTML='<span style="color:var(--muted)">尚無就診紀錄</span>';return;}
  // 時段分布摘要（非重疊區間）
  const valid=rows.filter(a=>a.status!=='cancelled');
  const buckets=[['近1月',0,30],['1–3月',30,90],['3–6月',90,180],['半年–1年',180,365],['1年以上',365,9e9]];
  const counts=buckets.map(()=>0);
  valid.forEach(a=>{const days=Math.floor((new Date()-new Date(a.appointment_date+'T00:00:00'))/86400000);
    for(let i=0;i<buckets.length;i++){if(days>=buckets[i][1]&&days<buckets[i][2]){counts[i]++;break;}}});
  const summary=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">`+
    buckets.map((b,i)=>`<span style="font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:10px;background:${counts[i]?'rgba(124,92,191,.08)':'transparent'};color:${counts[i]?'var(--ink)':'var(--muted)'}">${b[0]} <b style="color:${counts[i]?'#6b4fb0':'var(--muted)'}">${counts[i]}</b></span>`).join('')+`</div>`;
  el.innerHTML=`<div style="font-size:11px;color:var(--accent);margin-bottom:8px">總共 ${valid.length} 次就診</div>`+summary+
    rows.slice(0,30).map(a=>{
      const th=a.therapist_id?(therapists.find(t=>t.id===a.therapist_id)||{}).name||'':'不指定';
      const cancelled=a.status==='cancelled';
      return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);${cancelled?'opacity:.45;text-decoration:line-through':''}">
        <span style="display:flex;align-items:center;gap:7px"><span style="font-size:10px;color:#fff;background:${relColor(a.appointment_date)};padding:1px 7px;border-radius:9px;white-space:nowrap">${relTime(a.appointment_date)}</span><span>${a.appointment_date} ${a.appointment_time.slice(0,5)}</span></span>
        <button onclick="event.stopPropagation();openTracking('${String(p.name).replace(/'/g,'')}')"
      style="padding:6px 12px;border:1.5px solid #c2571f;background:#fff;color:#c2571f;font-size:12px;font-weight:700;cursor:pointer;border-radius:10px;white-space:nowrap;font-family:'Noto Sans TC',sans-serif">📋 治療紀錄</button>
    <span style="color:var(--muted);font-size:11px;text-align:right">${a.type==='new'?'初診':'複診'}${th?' · '+th:''}</span>
      </div>${noteText(a)?`<div style="padding:3px 0 7px 2px;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--new-color);background:var(--new-bg);padding:2px 8px;border-radius:7px;line-height:1.6;display:inline-block">📝 ${esc(noteText(a))}</span></div>`:''}`;
    }).join('')+(rows.length>30?`<div style="font-size:11px;color:var(--muted);margin-top:6px">（僅顯示最近 30 筆）</div>`:'');
}

const _apptCache=new Map(); // cacheKey -> {data, ts}
const _CACHE_TTL=90000; // 90秒快取

function _getDateRange(){
  let s,e;
  if(curView==='day'){s=e=fmtDate(curDate);}
  else if(curView==='week'){
    const ws=getWeekStart(curDate);const we=new Date(ws);we.setDate(ws.getDate()+6);
    s=fmtDate(ws);e=fmtDate(we);
  } else {
    const first=new Date(curDate.getFullYear(),curDate.getMonth(),1);
    const last=new Date(curDate.getFullYear(),curDate.getMonth()+1,0);
    s=fmtDate(first);e=fmtDate(last);
  }
  return {s,e,key:`${s}_${e}`};
}

async function _fetchAppts(s,e,key){
  const{data}=await sb.from('appointments').select('*')
    .gte('appointment_date',s).lte('appointment_date',e)
    .order('appointment_date').order('appointment_time');
  if(data)_apptCache.set(key,{data,ts:Date.now()});
  return data;
}

function _prefetchAdjacent(){
  // 背景預取相鄰頁
  const d=new Date(curDate);
  let nd;
  if(curView==='day'){nd=new Date(d);nd.setDate(d.getDate()+1);}
  else if(curView==='week'){nd=new Date(d);nd.setDate(d.getDate()+7);}
  else{nd=new Date(d.getFullYear(),d.getMonth()+1,1);}
  const saved=curDate;curDate=nd;
  const{s,e,key}=_getDateRange();curDate=saved;
  if(!_apptCache.has(key)) setTimeout(()=>_fetchAppts(s,e,key),600);
}

async function loadData(){
  if(sessionStorage.getItem('admin_auth')!=='1')return;
  const{s,e,key}=_getDateRange();
  const cached=_apptCache.get(key);
  // 有快取就先即時渲染
  if(cached){
    appointments=cached.data;
    if(!therapists.length){
      const{data:ths}=await sb.from('therapists').select('*').order('id');
      if(ths)therapists=ths;
    }
    render();
    loadBirthMonths().then(ch=>{if(ch)render();});
    // 快取過期才背景刷新
    if(Date.now()-cached.ts>_CACHE_TTL){
      _fetchAppts(s,e,key).then(data=>{if(data){appointments=data;render();}});
    }
    _prefetchAdjacent();
    return;
  }
  // 無快取：治療師 & 預約同時查
  const[thRes,apptData]=await Promise.all([
    therapists.length?Promise.resolve({data:therapists}):sb.from('therapists').select('*').order('id'),
    _fetchAppts(s,e,key)
  ]);
  if(thRes.data)therapists=thRes.data;
  // apptData 為 null 代表讀取失敗（成功但沒資料會是空陣列）→ 出提示，別讓治療師誤以為「今天沒人約」
  if(apptData)appointments=apptData;
  else showToast('讀取預約失敗，請檢查網路後重新整理');
  render();
  loadBirthMonths().then(()=>render());
  _prefetchAdjacent();
}

/* ── 左側小日曆：點日期 → 主檢視跳到該日期（保留目前日/週/月層級）── */
function renderMiniCal(){
  const panel=document.getElementById('miniCalPanel');
  if(!panel)return;
  if(curPage!=='calendar'){panel.style.display='none';return;}
  panel.style.display='';
  const y=miniCalDate.getFullYear(), m=miniCalDate.getMonth();
  const first=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const todayS=fmtDate(new Date()), curS=fmtDate(curDate);
  const wkStart=getWeekStart(curDate), wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);
  const wkS=fmtDate(wkStart), wkE=fmtDate(wkEnd);
  const wd=['日','一','二','三','四','五','六'];
  const head=wd.map(d=>`<div style="text-align:center;font-size:10px;color:var(--muted);padding:3px 0;font-weight:300">${d}</div>`).join('');
  let cells='';
  const total=Math.ceil((first+dim)/7)*7;
  for(let i=0;i<total;i++){
    const dn=i-first+1, valid=dn>=1&&dn<=dim;
    const d=valid?new Date(y,m,dn):null, ds=d?fmtDate(d):'';
    const isToday=ds===todayS, isCur=ds===curS;
    // 週檢視時，把整週淡淡標起來
    const inWeek=curView==='week'&&valid&&ds>=wkS&&ds<=wkE;
    let bg='transparent',col=valid?'var(--text)':'transparent',rad='50%',fw='400';
    if(isCur){bg='var(--warm)';col='#f3ede1';fw='500';}
    else if(isToday){bg='var(--glow)';col='var(--accent)';fw='500';}
    else if(inWeek){bg='rgba(192,138,82,.10)';rad='0';}
    cells+=`<div ${valid?`class="mini-day" onclick="pickMiniDate('${ds}')"`:''} style="text-align:center;font-size:11px;line-height:24px;height:24px;cursor:${valid?'pointer':'default'};background:${bg};color:${col};border-radius:${rad};font-weight:${fw};transition:background .12s">${valid?dn:''}</div>`;
  }
  const _tn=new Date(), _tw=wd[_tn.getDay()];
  panel.innerHTML=`
    <div style="background:#fff;border-radius:14px;box-shadow:0 1px 5px rgba(120,80,40,.09);padding:9px 14px;margin-bottom:10px;display:flex;align-items:center;gap:6px;white-space:nowrap">
      <span style="font-size:11px;color:#a08b76;font-weight:700;white-space:nowrap">今天</span>
      <span style="font-size:14px;font-weight:900;color:#3d3026;white-space:nowrap">${_tn.getMonth()+1}/${_tn.getDate()}（${_tw}）</span>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 9px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:12px;font-weight:400;letter-spacing:.5px">${y}年${m+1}月</span>
        <span>
          <button onclick="miniCalNav(-1)" style="border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;padding:0 5px;font-family:serif">‹</button>
          <button onclick="miniCalNav(1)" style="border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;padding:0 5px;font-family:serif">›</button>
        </span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr)">${head}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px 0">${cells}</div>
    </div>
    ${renderDayNotesPanel()}`;
}

/* ════════ 治療師排班（每週固定班表）════════ */
let schedules={};            // {therapist_id: {"1":["am","pm"], ...}}  星期1~6=一~六、0=日
let _shiftTid=null;          // 排班視窗目前選的治療師
const SHIFT_BLOCKS=[
  {code:'am', name:'早診',  time:'09:00–11:00'},
  {code:'pm', name:'下午診',time:'15:00–17:00'},
  {code:'eve',name:'晚診',  time:'18:00–20:00'},
];
const SHIFT_WDAYS=[{w:1,n:'一'},{w:2,n:'二'},{w:3,n:'三'},{w:4,n:'四'},{w:5,n:'五'},{w:6,n:'六'},{w:0,n:'日'}];

async function loadSchedules(){
  const{data}=await sb.from('therapist_schedules').select('therapist_id,shifts');
  schedules={};
  (data||[]).forEach(r=>{schedules[r.therapist_id]=r.shifts||{};});
}

async function openShiftScheduler(){
  if(!therapists.length){const{data}=await sb.from('therapists').select('*').order('id');if(data)therapists=data;}
  await loadSchedules();
  if(_shiftTid===null)_shiftTid=therapists[0]?therapists[0].id:1;
  renderShiftScheduler();
}

function _shiftOn(tid,wd,code){return ((schedules[tid]||{})[String(wd)]||[]).includes(code);}

function renderShiftScheduler(){
  const tid=_shiftTid;
  const thBtns=therapists.map(t=>`<div onclick="_shiftTid=${t.id};renderShiftScheduler()" style="padding:5px 13px;border:1px solid ${t.id===tid?'var(--warm)':'var(--border)'};border-radius:10px;font-size:12px;cursor:pointer;background:${t.id===tid?'var(--glow)':'transparent'};color:${t.id===tid?'var(--accent)':'var(--text2)'};white-space:nowrap;flex-shrink:0">${t.name}</div>`).join('');
  const headRow=`<div style="display:grid;grid-template-columns:58px repeat(7,1fr);gap:4px;margin-bottom:5px">
    <div></div>${SHIFT_WDAYS.map(d=>`<div style="text-align:center;font-size:12px;color:var(--muted)">${d.n}</div>`).join('')}
  </div>`;
  const rows=SHIFT_BLOCKS.map(b=>`<div style="display:grid;grid-template-columns:58px repeat(7,1fr);gap:4px;margin-bottom:4px;align-items:center">
    <div style="font-size:11px;color:var(--text2);line-height:1.25">${b.name}<br><span style="font-size:9px;color:var(--muted)">${b.time}</span></div>
    ${SHIFT_WDAYS.map(d=>{const on=_shiftOn(tid,d.w,b.code);return `<div onclick="toggleShift(${d.w},'${b.code}')" style="height:36px;border-radius:8px;border:1px solid ${on?'var(--warm)':'var(--border)'};background:${on?'var(--warm)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:15px">${on?'✓':''}</div>`;}).join('')}
  </div>`).join('');
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="guardedCloseModal()">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:540px">
      <div class="modal-handle"></div>
      <p class="modal-title">🗓️ 治療師排班</p>
      <p style="font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:300;line-height:1.6">勾選＝該治療師這個時段有上班。病人預約選到他時，只會看到打勾的時段。臨時請假請用日曆的「公休／活動」擋當天，不用動這張班表。</p>
      <div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;-webkit-overflow-scrolling:touch;padding-bottom:2px">${thBtns}</div>
      ${headRow}${rows}
      <div style="display:flex;gap:7px;margin-top:14px;flex-wrap:wrap">
        <button class="mBtn" onclick="clearShifts()">清空這位</button>
        <button class="mBtn" onclick="copyShiftsToAll()">複製到其他人</button>
      </div>
      <div class="modal-btns">
        <button class="mBtn" onclick="closeModal()">關閉</button>
        <button class="mBtn primary" onclick="saveShifts()">儲存班表</button>
      </div>
    </div>
  </div>`;
}

function toggleShift(wd,code){
  const tid=_shiftTid;
  if(!schedules[tid])schedules[tid]={};
  const k=String(wd);
  const arr=(schedules[tid][k]||[]).slice();
  const i=arr.indexOf(code);
  if(i>=0)arr.splice(i,1);else arr.push(code);
  if(arr.length)schedules[tid][k]=arr;else delete schedules[tid][k];
  renderShiftScheduler();
}

function clearShifts(){schedules[_shiftTid]={};renderShiftScheduler();}

function copyShiftsToAll(){
  const src=JSON.stringify(schedules[_shiftTid]||{});
  therapists.forEach(t=>{if(t.id!==_shiftTid)schedules[t.id]=JSON.parse(src);});
  showToast('已複製到其他治療師（記得按儲存）');
}

async function saveShifts(){
  const rows=therapists.map(t=>({therapist_id:t.id,shifts:schedules[t.id]||{},updated_at:new Date().toISOString()}));
  const{error}=await sb.from('therapist_schedules').upsert(rows,{onConflict:'therapist_id'});
  if(error){showToast('儲存失敗：'+error.message);return;}
  showToast('班表已儲存 ✓');
  closeModal();
}

// 代約：note 以 proxy:<代約者id> 記錄，回傳代約者治療師物件
function proxyOf(a){
  if(!a||!a.note||a.note.indexOf('proxy:')!==0) return null;
  const m=a.note.match(/^proxy:(\d+)/);
  if(!m) return null;
  return therapists.find(t=>t.id===parseInt(m[1]))||null;
}
// 取出乾淨的病人備註（排除 event:、剝掉 proxy:id| 前綴）；舊資料 fallback symptoms
function noteText(a){
  if(!a) return '';
  let n=a.note||'';
  if(n.indexOf('event:')===0) return '';
  if(n.indexOf('proxy:')===0){ const i=n.indexOf('|'); n=(i>=0)?n.slice(i+1):''; }
  n=n.trim();
  if(!n && a.symptoms && String(a.symptoms).indexOf(PARTS_MARK)!==0) n=String(a.symptoms).trim();   // 舊後台備註存在 symptoms（但「部位:」開頭是治療部位，不算備註）
  return n;
}
// 組合 note 欄位：代約者id + 病人備註共存
function buildNote(proxyId, text){
  text=(text||'').trim();
  if(proxyId) return 'proxy:'+proxyId+(text?'|'+text:'');
  return text;
}
function thCodeRaw(t){ return t.code || t.name.slice(-1); }
function thCode(a){
  if(!a.therapist_id) return '未';
  const t=therapists.find(x=>x.id===a.therapist_id);
  if(!t) return '未';
  const tc=thCodeRaw(t);
  const p=proxyOf(a);
  if(p) return thCodeRaw(p)+'約'+tc;   // 代約顯示：軒約維
  return tc;
}
function apptBg(a){
  /* Google 日曆風：整塊實心填代表色 */
  if(isEvent(a)) return 'rgba(90,65,38,.16)';          /* 活動/休診：半透明底墊,不蓋病人卡 */
  if(proxyOf(a)) return '#7986CB';                     /* 代約：薰衣草 */
  if(a.therapist_id){const t=therapists.find(x=>x.id===a.therapist_id);if(t)return thColor(t);}
  return '#F6BF26';                                    /* 未指定：黃色 */
}
function isUnassigned(a){return !isEvent(a)&&!proxyOf(a)&&!a.therapist_id;}
// 依底色亮度自動選字色（亮底→深字、暗底→白字），確保每張卡片都清楚易讀
function lumOf(hex){
  if(!hex||hex[0]!=='#'||hex.length<7) return 0;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 0.299*r+0.587*g+0.114*b;
}
function apptColor(a){
  if(isEvent(a)) return '#5a4126';                          // 活動:半透明底配深字
  if(window.innerWidth<=640) return '#222';                 // 手機：統一深字（測試，像未指定那樣）
  return lumOf(apptBg(a))>165 ? '#2b2b2b' : '#fff';
}
function apptBorder(a){
  if(isEvent(a)) return 'rgba(90,65,38,.45)';          /* 活動:淡邊 */
  if(proxyOf(a)) return '#7986CB';                     /* 代約薰衣草邊 */
  if(a.therapist_id){const t=therapists.find(x=>x.id===a.therapist_id);if(t)return thColor(t);}
  return '#F6BF26';                                    /* 未指定：黃色 */
}
function apptLabel(a){ return a.type==='new'?'初':''; }
// 滑鼠移過去：浮到最上層 + 展開到完整寬度（解決最上層窄卡片看不全）
/* 點擊某張預約卡 → 把它「浮到最上層」(重疊時被壓住的那張，點了就完整露出)，再開詳情。
   不再用 hover 自動撐開（會閃），改成像 Google 日曆：排排站、點哪張哪張浮起。 */
function apptClick(el,id,ev){
  // 先把上次被點浮起的卡還原回它原本的層
  document.querySelectorAll('.appt-block').forEach(b=>{ if(b!==el && b.dataset.bz){ b.style.zIndex=b.dataset.bz; delete b.dataset.bz; } });
  if(!el.dataset.bz) el.dataset.bz=el.style.zIndex||'';   // 記住原本的層
  el.style.zIndex='60';                                    // 浮起（高於其它卡、低於彈窗100）
  const a=appointments.find(x=>x.id===id);
  if(a&&isEvent(a)){ openModal(id); return; }   // 活動/公休直接開原本視窗
  openApptPopover(el,id,ev);                     // 病人預約：先跳資訊小卡（貼著點擊位置）
}
function apptHover(){}  /* 保留空殼避免舊呼叫報錯；hover 不再做任何事 */

/* 病人預約資訊小卡：放在標籤旁的空白處（不蓋標籤），按「修改」才開完整詳情 */
function openApptPopover(el,id,ev){
  closeApptPopover();
  const a=appointments.find(x=>x.id===id); if(!a){ openModal(id); return; }
  const d=new Date(a.appointment_date+'T00:00:00');
  const wd=['日','一','二','三','四','五','六'][d.getDay()];
  const dateStr=`${d.getMonth()+1}月${d.getDate()}日（週${wd}）`;
  // 連續時段(如 60 分鐘=兩格)要顯示完整範圍，不只第一格
  let endTime=slotEnd(a.appointment_time);
  try{ const sameDay=appointments.filter(x=>x.appointment_date===a.appointment_date&&x.status!=='cancelled'); const grp=groupConsecutiveAppts(sameDay).find(g=>g.some(x=>x.id===id)); if(grp&&grp.length)endTime=slotEnd(grp[grp.length-1].appointment_time); }catch(e){}
  const timeStr=`${a.appointment_time.slice(0,5)} – ${endTime}`;
  const phone=a.patient_phone?esc(a.patient_phone):'';
  const px=proxyOf(a); const note=noteText(a);
  const isNew=a.type==='new';
  const pop=document.createElement('div'); pop.className='appt-pop'; pop.id='apptPop';
  pop.onclick=function(e){e.stopPropagation();};
  pop.innerHTML=`
    <button class="ap-x" onclick="closeApptPopover()" title="關閉">✕</button>
    <div class="ap-title"><span class="ap-dot" style="background:${apptBg(a)}"></span>
      <span>${thCode(a)?esc(thCode(a))+'—':''}${esc(a.patient_name)}${bm(a)}</span>
      ${isNew?'<span style="font-size:10px;font-weight:600;background:var(--new-bg);color:var(--new-color);padding:1px 7px;border-radius:8px">初診</span>':''}
    </div>
    <div class="ap-row"><span class="ap-ic">◷</span><div>${dateStr}<br>${timeStr}</div></div>
    <div class="ap-row" style="position:relative"><span class="ap-ic">◍</span><div>${esc(getThName(a.therapist_id))}</div>
      <button style="position:absolute;right:0;bottom:-2px;width:calc(50% - 8px);display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border:1px solid #c2571f;border-radius:9px;background:#fdf1e6;color:#c2571f;font-size:12px;font-weight:900;cursor:pointer;font-family:'Noto Sans TC',sans-serif;letter-spacing:.5px" onclick="closeApptPopover();trkFromAppt('${esc(a.patient_name).replace(/'/g,'')}')">📋 治療紀錄</button>
    </div>
    ${phone?`<div class="ap-row"><span class="ap-ic">☏</span><div>${phone}</div></div>`:''}
    ${px?`<div class="ap-row"><span class="ap-ic">⇄</span><div>代約：${esc(px.name)} 治療師</div></div>`:''}
    ${partsText(a)?`<div class="ap-row"><span class="ap-ic">⊕</span><div>${esc(partsText(a))}</div></div>`:''}
    ${note?`<div class="ap-row"><span class="ap-ic">✎</span><div>${esc(note)}</div></div>`:''}
    
    <div class="ap-btns">
      <button class="ap-btn primary" onclick="bookNext(${id})">約下次</button>
      <button class="ap-btn" onclick="closeApptPopover();openModal(${id})">修改</button>
    </div>
    </div>
    <div class="ap-btns" style="margin-top:7px">
      <button class="ap-btn danger" onclick="closeApptPopover();cancelAppt(${id})">取消預約</button>
    </div>`;
  document.body.appendChild(pop);
  // 定位：貼著「點擊位置」出現在游標的右上方（離手最近）。沒有點擊座標時退回用方塊右上角。
  const pw=pop.offsetWidth, ph=pop.offsetHeight, gap=6;
  const r=el.getBoundingClientRect();
  const ax=(ev&&ev.clientX!=null)?ev.clientX:r.right;
  const ay=(ev&&ev.clientY!=null)?ev.clientY:r.top;
  let left=ax+gap;                 // 游標右側
  let top =ay-ph-gap;              // 游標上方 → 整體落在「右上方」
  if(top<8) top=ay+gap+8;          // 上方空間不夠 → 改放右下方
  if(left+pw>window.innerWidth-8) left=ax-pw-gap;   // 右邊放不下 → 改放左邊
  if(left<8) left=8;
  if(top+ph>window.innerHeight-8) top=window.innerHeight-ph-8;
  if(top<8) top=8;

/* 約下次：幫現場/不會用手機的病人快速約下一次回診。
   開「新增預約」表單(不動原本那筆)，預帶 姓名/電話/同治療師/複診，日期預設下週同一天、同時段，只要點日期確認即可。 */
function bookNext(id){
  const a=appointments.find(x=>x.id===id); if(!a){ closeApptPopover(); return; }
  closeApptPopover();
  // 算出「這次」的完整時長（連續幾格→結束時間），約下次時自動沿用同樣長度（na-end 仍可手動再調）
  let endT='';
  try{
    const sameDay=appointments.filter(x=>x.appointment_date===a.appointment_date&&x.status!=='cancelled');
    const grp=groupConsecutiveAppts(sameDay).find(g=>g.some(x=>x.id===id));
    if(grp&&grp.length>1) endT=slotEnd(grp[grp.length-1].appointment_time);   // 例：60分=2格→帶+60分結束
  }catch(e){}
  const d=new Date(a.appointment_date+'T00:00:00'); d.setDate(d.getDate()+7);   // 預設下週同一天
  const nd=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const nt=a.appointment_time.slice(0,5);                                        // 預設同時段
  window._pendingProxyTh=a.therapist_id||'';     // 預選同一位治療師
  openNewApptAt(nd, nt);                          // 走「新增」流程（不會改到原本那筆）
  window._naType='return'; naSelectType('return');// 約下次＝複診
  const setv=(i,v)=>{const el=document.getElementById(i); if(el)el.value=v;};
  setv('na-name', a.patient_name||'');
  setv('na-phone', a.patient_phone||'');
  // ★ 下次自動沿用這次時長（在 naSelectType 之後設，避免被重置）
  if(endT){ const eEl=document.getElementById('na-end'); if(eEl){ eEl.value=endT; if(typeof renderDayTimeline==='function') renderDayTimeline(); } }
  const t=document.querySelector('#modalArea .modal-title'); if(t)t.textContent='約下次（複診）';
}

// 把時間軸錨定到中午 12:00
function scrollCalToFirst(id){
  const c=document.getElementById(id);if(!c)return;
  // 拖放/編輯後的重畫不要自動捲，否則畫面會跳（保持使用者當下的捲動位置）
  if(window._noAutoScroll){window._noAutoScroll=false;return;}
  // 算出當天/當週預約範圍(第一筆~最後一筆)中點
  const ds=curView==='day'?fmtDate(curDate):null;
  let first=null,last=null;
  appointments.forEach(a=>{
    if(a.status==='cancelled')return;
    if(ds&&a.appointment_date!==ds)return;
    if(!(curThId===0||a.therapist_id===curThId||(isEvent(a)&&a.therapist_id===null)))return;
    const t=a.appointment_time.slice(0,5);
    if(!first||t<first)first=t;
    if(!last||t>last)last=t;
  });
  const mobile=window.innerWidth<=640;
  const fi=first?TIMES.indexOf(first):TIMES.indexOf('12:00');
  const li=last?TIMES.indexOf(last):TIMES.indexOf('12:00');
  const midPx=((fi+li)/2)*SLOT_H + SLOT_H/2;
  if(mobile){
    // 整頁自然捲動：把第一筆預約捲到畫面中間；沒有預約就捲到上午工作時段（不再停在凌晨空白）
    const host=document.getElementById('mainContent'); if(!host)return;
    const place=()=>{
      if(!host.isConnected)return;
      const block=host.querySelector('.appt-block');
      if(block){ block.scrollIntoView({block:'center'}); return; }   // 有預約→帶到畫面中間
      const cc=document.getElementById(id);                          // 無預約→捲到 09:00 附近
      if(cc&&cc.isConnected){
        const y=cc.getBoundingClientRect().top+window.scrollY+TIMES.indexOf('09:00')*SLOT_H-60;
        window.scrollTo(0, Math.max(0, Math.round(y)));
      }
    };
    requestAnimationFrame(()=>requestAnimationFrame(place));  // 等版面穩定後再捲
    setTimeout(place,180);                                    // 字體/網址列縮放後再校正一次
    return;
  }
  const visH=c.clientHeight||c.offsetHeight||400;
  c.scrollTop=Math.max(0, Math.round(midPx - visH/2));
}

function toggleDaySidebar(){

function renderMonth(){
  const year=curDate.getFullYear(),month=curDate.getMonth();
  const first=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=fmtDate(new Date());
  let html=`<div style="padding:0 12px 20px"><div style="background:var(--surface);overflow:hidden;display:flex;flex-direction:column;min-height:calc(100vh - 165px)">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
      ${DAYS.map(d=>`<div style="text-align:center;padding:7px 4px;font-size:11px;color:var(--muted);background:var(--bg);font-weight:300">${d}</div>`).join('')}
    </div>
    <div style="flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(96px,1fr)">`;
  let cells=first+daysInMonth;
  let total=Math.ceil(cells/7)*7;
  for(let i=0;i<total;i++){
    const dayNum=i-first+1;
    const valid=dayNum>=1&&dayNum<=daysInMonth;
    const d=valid?new Date(year,month,dayNum):null;
    const ds=d?fmtDate(d):'';
    const isToday=ds===todayStr;
    const isSun=d&&d.getDay()===0;
    const dayAppts=valid?appointments.filter(a=>a.appointment_date===ds&&a.status!=='cancelled'&&(curThId===0||a.therapist_id===curThId||(isEvent(a)&&a.therapist_id===null))):[];
    const lb=valid?lunarLabel(d):null;
    html+=`<div onclick="${valid?`gotoDayView('${ds}')`:''}" style="min-height:96px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:4px;cursor:${valid?'pointer':'default'};${isToday?'background:rgba(192,138,82,.06)':''}${isSun&&!isToday?'background:rgba(217,110,40,.03)':''}">`;
    if(valid){
      html+=`<div style="margin-bottom:1px;display:flex;align-items:baseline;gap:3px">
        <span style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:${isToday?'500':'400'};background:${isToday?'var(--warm)':'transparent'};color:${isToday?'#f3ede1':isSun?'var(--new-color)':'var(--text)'};padding:${isToday?'0 4px':'0'};line-height:1.4">${dayNum}</span>
        ${lb?.lunar?`<span style="font-size:11px;color:${lb.hot?'var(--warm)':'var(--muted)'};font-weight:300">${lb.lunar}</span>`:''}
      </div>
      ${lb?.holiday?`<div style="font-size:10px;color:var(--warm);font-weight:400;margin-bottom:3px;line-height:1.2">${lb.holiday}</div>`:'<div style="margin-bottom:3px"></div>'}`;
      const groups=groupConsecutiveAppts(dayAppts);
      groups.slice(0,3).forEach(g=>{
        const a=g[0];const span=g.length;
        html+=`<div onclick="event.stopPropagation();openModal(${a.id})" style="background:${apptBg(a)};color:${apptColor(a)};padding:2px 6px;font-size:10px;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:400;border-radius:6px">${thCode(a)?thCode(a)+'—':''}${a.patient_name}${bm(a)}${!isEvent(a)&&a.type==='new'?' <span style="background:rgba(255,255,255,.32);padding:0 3px;border-radius:4px">初</span>':''} ${a.appointment_time.slice(0,5)}${span>1?'-'+g[span-1].appointment_time.slice(0,5):''}</div>`;
      });
      if(groups.length>3)html+=`<div onclick="event.stopPropagation();openDayPopover('${ds}',event)" style="font-size:10px;color:var(--accent);padding:2px 6px;font-weight:400;cursor:pointer;border-radius:6px;display:inline-block" onmouseover="this.style.background='var(--glow)'" onmouseout="this.style.background='transparent'">還有 ${groups.length-3} 個 ›</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div></div></div>`;
  document.getElementById('mainContent').innerHTML=html;
}

      (curThId===0||a.therapist_id===curThId||(isEvent(a)&&a.therapist_id===null))
    );

    // 背景行（半點分隔線變淡）
    const rowsHtml=TIMES.map(t=>`<div class="week-cell ${isToday?'today-col':''}" style="height:${CELL_H}px;border-bottom:1px solid ${t.endsWith(':30')?'var(--grid)':'transparent'};"
      ondragover="onCellDragOver(event)" ondragleave="onCellDragLeave(event)"
      ondrop="onCellDrop(event,'${ds}','${t}')"></div>`).join('');

    // 跨列方塊（Google 風格重疊排版）
    const groups=groupConsecutiveAppts(colAppts);
    const items=groups.map(g=>{const ti=TIMES.indexOf(g[0].appointment_time.slice(0,5));return{g,s:ti,e:ti+g.length};}).filter(x=>x.s>=0);
    const apIt=items.filter(x=>!isEvent(x.g[0]));
    layoutOverlap(apIt);                                // 活動不佔欄位
    items.filter(x=>isEvent(x.g[0])).forEach(x=>{x.col=0;x.cols=1;});
    let blocksHtml='';
    items.forEach(it=>{
      const group=it.g, a=group[0], slots=group.length;
      const unit=100/it.cols;
      const left=it.col*unit, width=(it.cols-it.col)*unit; // 交疊堆層
      const topPx=it.s*CELL_H+3;const heightPx=slots*CELL_H-6;
      blocksHtml+=`<div class="appt-block"
        style="background:${apptBg(a)};color:${apptColor(a)};
               position:absolute;left:${(left+0.6).toFixed(1)}%;width:${(width-1.3).toFixed(1)}%;
               top:${topPx}px;height:${heightPx}px;right:auto;z-index:${isEvent(a)?1:3+it.col};${isEvent(a)?'border:1.5px dashed rgba(90,65,38,.45);box-shadow:none;':''}"
        draggable="true" data-id="${a.id}"
        ondragstart="onDragStart(event,${a.id})"
        ondragend="onDragEnd(event)"
        ondragover="event.preventDefault()"
        ondrop="onCellDrop(event,'${ds}','${TIMES[it.s]}')"
        onclick="event.stopPropagation();apptClick(this,${a.id},event)">
        <b>${thCode(a)?thCode(a)+'—':''} ${a.patient_name}${bm(a)}${!isEvent(a)&&a.type==='new'?' 初':''}</b>
        <span>${a.appointment_time.slice(0,5)} – ${slotEnd(group[slots-1].appointment_time)}</span>
        ${partsText(a)?`<span style="font-size:9px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block">${esc(partsText(a))}</span>`:''}
      </div>`;
    });

    return `<div style="flex:1;border-left:1px solid var(--border);position:relative;min-width:0;" onmousedown="calSelStart(event,this,'${ds}')">${rowsHtml}${blocksHtml}</div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=`<div class="week-outer">
    <div style="min-width:520px;background:var(--surface);overflow:hidden">
      <div style="display:flex;border-bottom:1px solid var(--border);background:var(--bg)">
        <div style="width:56px;flex-shrink:0"></div>
        ${headers}
      </div>
      <div id="week-scroll" class="cal-scroll" style="display:flex;max-height:calc(100vh - 165px);overflow-y:auto">
        <div style="width:56px;flex-shrink:0;border-right:1px solid var(--border)">${timeColHtml}</div>
        ${dayColumns}
      </div>
    </div>
  </div>`;
  scrollCalToFirst('week-scroll', Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return fmtDate(d);}));
}

/* ── DRAG & DROP ── */
function onDragStart(e, id){
  dragApptId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(()=>{const el=e.target;if(el)el.classList.add('dragging');},0);
  const a=appointments.find(x=>x.id===id);
  if(a){
    window._dragName=a.patient_name;
    dragGhost=document.createElement('div');
    dragGhost.className='drag-ghost';
    dragGhost.style.cssText=`background:${apptBg(a)};color:${apptColor(a)};border:1px solid ${apptBorder(a)};`;
    dragGhost.textContent=a.patient_name;
    document.body.appendChild(dragGhost);
    e.dataTransfer.setDragImage(dragGhost,-999,-999);
  }
  document.addEventListener('dragover',updateGhostPos);
}
// 依游標位置算「拖到哪個時間」——日檢視只算時間；週檢視算「哪一天＋時間」
const _DRAG_WD=['日','一','二','三','四','五','六'];
function dragTargetAt(e){
  if(curView==='day'){
    const sc=document.getElementById('day-scroll'), ar=sc&&sc.children[1];   // 方塊區，頂端=TIMES[0]
    if(!ar)return null;
    const i=Math.floor((e.clientY-ar.getBoundingClientRect().top)/SLOT_H);
    if(i<0||i>=TIMES.length)return null;
    return {date:fmtDate(curDate), time:TIMES[i], wd:null};
  }
  if(curView==='week'){
    const sc=document.getElementById('week-scroll'); if(!sc)return null;
    const cols=Array.prototype.slice.call(sc.children,1);   // [0]=時間欄，其餘=7 天的欄
    let ci=-1; for(let k=0;k<cols.length;k++){const r=cols[k].getBoundingClientRect(); if(e.clientX>=r.left&&e.clientX<r.right){ci=k;break;}}
    if(ci<0)return null;
    const r=cols[ci].getBoundingClientRect();
    const i=Math.floor((e.clientY-r.top)/SLOT_H);
    if(i<0||i>=TIMES.length)return null;
    const ws=getWeekStart(curDate), d=new Date(ws); d.setDate(ws.getDate()+ci);
    return {date:fmtDate(d), time:TIMES[i], wd:_DRAG_WD[d.getDay()]};
  }
  return null;
}
function updateGhostPos(e){
  if(!dragGhost)return;
  dragGhost.style.left=(e.clientX+12)+'px';
  dragGhost.style.top=(e.clientY-20)+'px';
  const t=dragTargetAt(e);
  dragGhost.textContent=(window._dragName||'')+(t?('　▸ '+(t.wd?('週'+t.wd+' '):'')+t.time):'');
}
function onDragEnd(e){
  document.querySelectorAll('.appt-block').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.week-cell').forEach(el=>el.classList.remove('drag-over'));
  if(dragGhost){dragGhost.remove();dragGhost=null;}
  document.removeEventListener('dragover',updateGhostPos);
  dragApptId=null;
}
function onCellDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function onCellDragLeave(e){e.currentTarget.classList.remove('drag-over');}
// 重畫但「保留目前捲動位置」，拖放/同步後畫面才不會跳回最上面
function renderKeepScroll(){
  const sc=document.getElementById('day-scroll')||document.getElementById('week-scroll');
  const top=sc?sc.scrollTop:window.scrollY;
  window._noAutoScroll=true;
  render();
  const sc2=document.getElementById('day-scroll')||document.getElementById('week-scroll');
  if(sc2) sc2.scrollTop=top; else window.scrollTo(0,top);
}

// ── 主畫面（日／週）在空白時間軸上「按著拖出一段」→ 直接開新預約並帶入開始～結束（像 Google 日曆）──
let _calSel=null;
function calSelStart(e, container, date){
  if(e.button!==0) return;
  if(e.target.closest('.appt-block')) return;   // 點在預約上 → 交給拖移，不開新範圍
  const i=Math.floor((e.clientY-container.getBoundingClientRect().top)/SLOT_H);
  if(i<0||i>=TIMES.length) return;
  _calSel={cont:container, date, a:i, b:i, moved:false};
  _calDrawSel();
  document.addEventListener('mousemove',_calSelMove);
  document.addEventListener('mouseup',_calSelUp);
  e.preventDefault();
}
function _calSelMove(e){
  if(!_calSel)return;
  let i=Math.floor((e.clientY-_calSel.cont.getBoundingClientRect().top)/SLOT_H);
  i=Math.max(0,Math.min(TIMES.length-1,i));
  if(i!==_calSel.a) _calSel.moved=true;
  _calSel.b=i; _calDrawSel();
}
function _calDrawSel(){
  if(!_calSel)return;
  const lo=Math.min(_calSel.a,_calSel.b), hi=Math.max(_calSel.a,_calSel.b);
  let el=document.getElementById('cal-selbox');
  if(!el){ el=document.createElement('div'); el.id='cal-selbox'; el.style.cssText='position:absolute;left:1px;right:1px;border:1.5px solid var(--warm);background:rgba(192,138,82,.20);border-radius:6px;pointer-events:none;z-index:30'; }
  if(el.parentElement!==_calSel.cont) _calSel.cont.appendChild(el);
  el.style.top=(lo*SLOT_H)+'px'; el.style.height=((hi-lo+1)*SLOT_H)+'px';
}
function _calSelUp(){
  document.removeEventListener('mousemove',_calSelMove);
  document.removeEventListener('mouseup',_calSelUp);
  const box=document.getElementById('cal-selbox'); if(box)box.remove();
  if(!_calSel)return;
  const sel=_calSel; _calSel=null;
  const lo=Math.min(sel.a,sel.b), hi=Math.max(sel.a,sel.b);
  openNewApptRange(sel.date, TIMES[lo], slotEnd(TIMES[hi]));   // 單點＝30分、拖曳＝整段
}
function openNewApptRange(date, startT, endT){
  openNewApptAt(date, startT);
  const eEl=document.getElementById('na-end'); if(eEl) eEl.value=endT;
  if(typeof renderDayTimeline==='function') renderDayTimeline();
}
async function onCellDrop(e, newDate, newTime){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragApptId)return;
  const a=appointments.find(x=>x.id===dragApptId);
  if(!a)return;
  // 用游標實際位置算落點（日＝時間；週＝哪天＋時間），拖到哪放哪（即使該時段已有人也能精準落下，重疊會並排顯示）
  const _tgt=dragTargetAt(e);
  if(_tgt){ newDate=_tgt.date; newTime=_tgt.time; }
  // 找出這張卡片代表的整組（連續同病人時段）→ 整組一起搬，保持相對位置
  const dayAppts=appointments.filter(x=>x.appointment_date===a.appointment_date&&x.status!=='cancelled');
  const grp=(groupConsecutiveAppts(dayAppts).find(g=>g.some(x=>x.id===dragApptId))||[a])
            .slice().sort((x,y)=>x.appointment_time.localeCompare(y.appointment_time));
  const baseIdx=TIMES.indexOf(grp[0].appointment_time.slice(0,5));
  const newBaseIdx=TIMES.indexOf(newTime);
  if(newBaseIdx<0)return;
  if(grp[0].appointment_date===newDate && baseIdx===newBaseIdx)return;
  // 每格依相對位移計算新時間
  const moves=grp.map(x=>{
    const off=TIMES.indexOf(x.appointment_time.slice(0,5))-baseIdx;
    const ni=newBaseIdx+off;
    return {row:x, nt:(ni>=0&&ni<TIMES.length)?TIMES[ni]+':00':null};
  });
  if(moves.some(m=>m.nt===null)){showToast('超出時間範圍');return;}
  const backup=grp.map(x=>({x,id:x.id,d:x.appointment_date,t:x.appointment_time}));
  moves.forEach(m=>{m.row.appointment_date=newDate;m.row.appointment_time=m.nt;});
  renderKeepScroll();   // 拖放後先樂觀重畫，保留捲動位置，畫面不跳
  const done=[];        // 記錄已成功寫入資料庫的格子，萬一中途失敗要一起回滾
  for(const m of moves){
    const{error}=await sb.from('appointments').update({appointment_date:newDate,appointment_time:m.nt}).eq('id',m.row.id);
    if(error){
      // 半套寫入救援：把「已經寫進資料庫」的幾格也改回原位，避免一筆預約被拆散在兩個時段
      for(const d of done){ await sb.from('appointments').update({appointment_date:d.d,appointment_time:d.t}).eq('id',d.id); }
      backup.forEach(b=>{b.x.appointment_date=b.d;b.x.appointment_time=b.t;});
      _invalidateCache(); renderKeepScroll(); showToast('同步失敗，已還原，請重新整理');
      await loadData();
      return;
    }
    const b=backup.find(b=>b.id===m.row.id);
    done.push({id:m.row.id, d:b.d, t:b.t});
  }
  _invalidateCache();   // 搬移成功→清掉快取，避免 90 秒內切換檢視看到舊位置
  showToast(`已移至 ${newDate.slice(5)} ${newTime}`);
}

function guardedCloseModal(){

  if(card){

}

// 在時間軸上拖曳選時段：按住=起點，拖到=終點，放開→自動填開始/結束（單點=保留原時長）
let _tlDrag=null;
function _tlSlotAtY(y){
  const wrap=document.getElementById('na-daytl-body'); if(!wrap)return -1;
  const i=Math.floor((y-wrap.getBoundingClientRect().top)/15);
  return (i>=0&&i<TIMES.length)?i:-1;
}
function _tlDrawSel(){
  const wrap=document.getElementById('na-daytl-body'); if(!wrap||!_tlDrag)return;
  const lo=Math.min(_tlDrag.a,_tlDrag.b), hi=Math.max(_tlDrag.a,_tlDrag.b);
  let el=document.getElementById('na-tl-selbox');
  if(!el){ el=document.createElement('div'); el.id='na-tl-selbox'; el.style.cssText='position:absolute;left:40px;right:0;border:1.5px solid var(--warm);background:rgba(192,138,82,.24);border-radius:4px;pointer-events:none;z-index:6'; wrap.appendChild(el); }
  el.style.top=(lo*15)+'px'; el.style.height=((hi-lo+1)*15)+'px';
}
function tlMouseDown(e){
  const i=_tlSlotAtY(e.clientY); if(i<0)return;
  _tlDrag={a:i,b:i};
  _tlDrawSel();
  document.addEventListener('mousemove',_tlMove);
  document.addEventListener('mouseup',_tlUp);
  e.preventDefault();
}
function _tlMove(e){ if(!_tlDrag)return; const i=_tlSlotAtY(e.clientY); if(i>=0){_tlDrag.b=i;_tlDrawSel();} }
function _tlUp(){
  document.removeEventListener('mousemove',_tlMove);
  document.removeEventListener('mouseup',_tlUp);
  if(!_tlDrag)return;
  const lo=Math.min(_tlDrag.a,_tlDrag.b), hi=Math.max(_tlDrag.a,_tlDrag.b);
  const drag=_tlDrag; _tlDrag=null;
  if(lo===hi){ pickTimelineSlot(TIMES[lo]); }   // 單點＝保留原本時長
  else{                                          // 拖曳＝明確 開始→結束
    const sEl=document.getElementById('na-time'), eEl=document.getElementById('na-end');
    if(sEl)sEl.value=TIMES[lo]; if(eEl)eEl.value=slotEnd(TIMES[hi]);
    renderDayTimeline();
  }
}
function pickTimelineSlot(t){
  const sEl=document.getElementById('na-time'), eEl=document.getElementById('na-end'); if(!sEl)return;
  const cur=slotRange(sEl.value, eEl?eEl.value:slotEnd(sEl.value)).length||1;   // 保留原本時長
  sEl.value=t;
  if(eEl){ const si=TIMES.indexOf(t), li=Math.min(TIMES.length-1, si+cur-1); eEl.value=slotEnd(TIMES[li]); }
  renderDayTimeline();
}

/* 部位存進預約 symptoms：格式 "部位:左肩膀,右膝蓋｜其他:肋骨"（前綴避免跟舊備註混淆）*/
const PARTS_MARK='部位:';
function buildPartsSymptoms(parts, other){
  parts=parts||[]; other=(other||'').trim();
  if(!parts.length && !other) return '';
  return PARTS_MARK + parts.join(',') + (other?('｜其他:'+other):'');
}
function parseParts(symptoms){
  const s=String(symptoms||'');
  if(s.indexOf(PARTS_MARK)!==0) return {parts:[], other:''};
  const body=s.slice(PARTS_MARK.length);
  const SEP='｜其他:';
  const i=body.indexOf(SEP);
  const partStr=i>=0?body.slice(0,i):body;
  const other=i>=0?body.slice(i+SEP.length):'';
  return {parts:partStr?partStr.split(',').filter(Boolean):[], other};
}
// 把某筆預約的治療部位組成可讀文字（標籤短顯示、小卡完整都用這個）
function partsText(a){
  const p=parseParts(a&&a.symptoms);
  let arr=p.parts.slice();
  if(p.other) arr.push('其他:'+p.other);
  return arr.join('・');
}

async function saveHomeExercise(lineUserId){
  const msg=document.getElementById('hx-msg');
  const items=[...document.querySelectorAll('.hx-cb:checked')].map(cb=>({title:cb.dataset.title,url:cb.dataset.url,tag:cb.dataset.tag,color:cb.dataset.color}));

  if(!items.length){ msg.style.color='var(--new-color)'; msg.textContent='請至少勾選一項運動'; return; }

  msg.style.color='var(--muted)'; msg.textContent='儲存中…';
  try{
    const {error}=await sb.from('home_exercises').upsert({line_user_id:lineUserId,items,note,updated_at:new Date().toISOString()},{onConflict:'line_user_id'});

    msg.style.color='var(--accent)'; msg.textContent='✅ 已儲存指派（'+items.length+' 支），病人打「我的運動」就收得到';

// 開始→結束 之間要佔的 30 分鐘格子（含開始、不含結束）；end<=start 至少回傳 1 格
function slotRange(start, end){
  const out=[]; let t=start, guard=0;
  while(t<end && guard<60){ out.push(t); t=slotEnd(t); guard++; }
  if(!out.length) out.push(start);
  return out;
}
// 改開始時間時，結束自動不早於「開始+30」
function naSyncEnd(){
  const sEl=document.getElementById('na-time'), eEl=document.getElementById('na-end');
  if(!sEl||!eEl)return;
  if(eEl.value<=sEl.value) eEl.value=slotEnd(sEl.value);
}

function naSelectType(t){
  window._naType=t;
  const on ="border:1.5px solid #c2571f;padding:10px;text-align:center;cursor:pointer;background:#c2571f;color:#fff;font-size:14px;font-weight:900;border-radius:12px";
  const off="border:1.5px solid #eee3d4;padding:10px;text-align:center;cursor:pointer;background:#fff;color:#6b5643;font-size:14px;font-weight:700;border-radius:12px";
  document.getElementById('na-new').style.cssText=(t==='new'?on:off);
  document.getElementById('na-return').style.cssText=(t==='return'?on:off);
}

function getNextTimeSlot(t){
  const idx=TIMES.indexOf(t);
  if(idx>=0&&idx<TIMES.length-1)return TIMES[idx+1];
  return null;
}

// 重疊檢查：同治療師、同日、時段相交 → 跳確認（後台允許重疊，只提醒一聲）。回 true=可繼續、false=使用者取消
async function checkOverlapConfirm(date, thId, slots, excludeIds){
  if(!thId) return true;
  const{data}=await sb.from('appointments').select('id,patient_name,appointment_time,note,status').eq('appointment_date',date).eq('therapist_id',parseInt(thId)).neq('status','cancelled');
  const ex=new Set(excludeIds||[]), slotSet=new Set(slots);
  const clash=(data||[]).filter(x=>!ex.has(x.id)&&!isEvent(x)&&slotSet.has(x.appointment_time.slice(0,5)));
  if(!clash.length) return true;
  const names=[...new Set(clash.map(x=>x.patient_name))].join('、');
  return confirm(`⚠️ 這個時段該治療師已經有預約：${names}\n\n此預約會與其他時段重疊，確定要繼續嗎？（現場自行分流）`);
}
async function submitNewAppt(){
  const name=document.getElementById('na-name').value.trim();
  const phone=document.getElementById('na-phone').value.trim();
  const thId=document.getElementById('na-th').value;
  const date=`${_naSelY}-${String(_naSelM+1).padStart(2,'0')}-${String(_naSelD).padStart(2,'0')}`;
  const time=document.getElementById('na-time').value;
  const note=document.getElementById('na-note').value.trim();
  if(!name||!time){showToast('請填寫姓名與時段');return;}
  if(window._naType==='new'&&!phone){showToast('初診請填寫電話');return;}
  const partsSym=buildPartsSymptoms(window._naParts,(document.getElementById('na-other')||{}).value);   // 治療部位存進 symptoms
  // 依「開始→結束」建出連續 30 分鐘格子（每格一筆，前台才會把整段封鎖）
  const endV=document.getElementById('na-end')?document.getElementById('na-end').value:slotEnd(time);
  const slots=slotRange(time, endV);
  const durMin=slots.length*30;
  const service=window._naType==='new'?'初診評估':('複診'+durMin+'分鐘');
  const proxyId=document.getElementById('na-proxy')?document.getElementById('na-proxy').value:(window._naProxyId||'');
  window._naProxyId=proxyId?parseInt(proxyId):null;
  if(!await checkOverlapConfirm(date, thId, slots, [])) return;   // 重疊提醒
  for(let i=0;i<slots.length;i++){
    const{error}=await sb.from('appointments').insert([{
      therapist_id:thId?parseInt(thId):null,
      patient_name:name,patient_phone:phone,
      appointment_date:date,appointment_time:slots[i]+':00',
      type:window._naType||'return',service:i===0?service:service+'（續）',
      symptoms:partsSym,note:buildNote(proxyId,note),status:'confirmed'
    }]).select();
    if(error){showToast((i===0?'新增失敗：':'第'+(i+1)+'格失敗：')+error.message); if(i===0)return;}
  }
  window._naProxyId=null;
  // 每次預約都整合病患（初診＋複診），用電話/姓名比對，找不到才建立
  await upsertPatient(name, phone, date, window._naParts, note);
  closeModal();showToast('預約已新增');_invalidateCache();await loadData();
}

// ── 編輯預約：開啟預填表單 ──
function openEditAppt(id){
  const a=appointments.find(x=>x.id===id);
  if(!a)return;
  // 一律用整組連續時段的「第一格」開啟編輯，避免點到 60 分鐘預約的第二格(續)時，
  // 存檔把預約誤砍成 30 分鐘、還連帶誤發一則「預約已取消」給病人
  const dayList=appointments.filter(x=>x.appointment_date===a.appointment_date&&x.status==='confirmed');
  const grp=(groupConsecutiveAppts(dayList).find(g=>g.some(x=>x.id===a.id))||[a])
    .slice().sort((x,y)=>x.appointment_time.localeCompare(y.appointment_time));
  const head=grp[0]||a;
  openNewApptAt(head.appointment_date, head.appointment_time.slice(0,5), head);
}
// ── 編輯預約：儲存變更（更新姓名/電話/治療師/日期/時段/類型/服務/備註）──
async function submitEditAppt(id){
  const a=appointments.find(x=>x.id===id);   // 編輯前的原始資料（用來找第二格兄弟列）
  const name=document.getElementById('na-name').value.trim();
  const phone=document.getElementById('na-phone').value.trim();
  const thId=document.getElementById('na-th').value;
  const date=`${_naSelY}-${String(_naSelM+1).padStart(2,'0')}-${String(_naSelD).padStart(2,'0')}`;
  const time=document.getElementById('na-time').value;
  const note=document.getElementById('na-note').value.trim();
  if(!name||!time){showToast('請填寫姓名與時段');return;}
  if(window._naType==='new'&&!phone){showToast('初診請填寫電話');return;}
  const partsSym=buildPartsSymptoms(window._naParts,(document.getElementById('na-other')||{}).value);   // 治療部位存進 symptoms
  const endV=document.getElementById('na-end')?document.getElementById('na-end').value:slotEnd(time);
  const slots=slotRange(time, endV);
  const durMin=slots.length*30;
  const service=window._naType==='new'?'初診評估':('複診'+durMin+'分鐘');
  const proxyId=document.getElementById('na-proxy')?document.getElementById('na-proxy').value:'';
  const thVal=thId?parseInt(thId):null;
  const noteVal=buildNote(proxyId,note);
  // 找出這筆原本的整組連續格子（含本身），由早到晚排序
  let oldGroup=[a].filter(Boolean);
  if(a){
    const _dl=appointments.filter(x=>x.appointment_date===a.appointment_date&&x.status==='confirmed');
    oldGroup=(groupConsecutiveAppts(_dl).find(g=>g.some(x=>x.id===id))||[a]).slice()
      .sort((x,y)=>x.appointment_time.localeCompare(y.appointment_time));
  }
  if(!await checkOverlapConfirm(date, thId, slots, oldGroup.map(x=>x.id))) return;   // 重疊提醒（排除自己）
  // 對齊到新時段：能更新就更新、不夠就新增、多出來就軟刪
  for(let i=0;i<Math.max(oldGroup.length,slots.length);i++){
    if(i<slots.length){
      const row={therapist_id:thVal,patient_name:name,patient_phone:phone,
        appointment_date:date,appointment_time:slots[i]+':00',
        type:window._naType||'return',service:i===0?service:service+'（續）',symptoms:partsSym,note:noteVal};
      if(i<oldGroup.length){
        const{error:e}=await sb.from('appointments').update(row).eq('id',oldGroup[i].id);
        if(e&&i===0){showToast('儲存失敗：'+e.message);return;}
      }else{
        await sb.from('appointments').insert([{...row,status:'confirmed'}]);
      }
    }else{
      // 縮短時長多出來的格子＝軟性移除，不是真的取消預約：一併清掉 line_user_id，
      // 讓 Make 的取消通知條件(status=cancelled 且 line_user_id 存在)不成立，病人才不會收到「預約已取消」
      await sb.from('appointments').update({status:'cancelled', line_user_id:null}).eq('id',oldGroup[i].id);
    }
  }
  await upsertPatient(name, phone, date, [], note);   // 編輯也整合病患
  closeModal();showToast('預約已更新');_invalidateCache();await loadData();
}
