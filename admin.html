    return `<div onclick="proxyTap(${t.id})" style="display:flex;align-items:center;justify-content:space-between;border:1px solid ${bd};background:${bg};padding:12px 15px;margin-bottom:8px;cursor:pointer">
      <span style="font-size:15px;font-weight:400">${t.name}</span>
      ${badge?`<span style="width:24px;height:24px;border-radius:50%;background:#7986CB;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500">${badge}</span>`:''}
    </div>`;
  }).join('');
  const ready=_proxyAgent&&_proxyTarget;
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="guardedCloseModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <p class="modal-title">代約</p>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.8">先點 <b style="color:#7986CB">幫忙約的人</b>（標 1），再點 <b style="color:#7986CB">看診的治療師</b>（標 2）</p>
      ${list}
      <div class="modal-btns">
        <button class="mBtn" onclick="closeModal()">取消</button>
        <button class="mBtn primary" ${ready?`onclick="proxyConfirm()"`:'disabled style="opacity:.4;cursor:not-allowed"'}>下一步 →</button>
      </div>
    </div>
  </div>`;
}
function proxyTap(id){
  if(_proxyAgent===id){_proxyAgent=null;}
  else if(_proxyTarget===id){_proxyTarget=null;}
  else if(!_proxyAgent){_proxyAgent=id;}
  else {_proxyTarget=id;}
  renderProxyPicker();
}
function proxyConfirm(){
  const agent=therapists.find(t=>t.id===_proxyAgent);
  const target=therapists.find(t=>t.id===_proxyTarget);
  if(!agent||!target)return;
  if(!confirm(`是否「${agent.name}」幫「${target.name}」代約病人？`))return;
  window._pendingProxyId=agent.id;
  window._pendingProxyTh=target.id;
  openNewApptAt(fmtDate(curDate), DEFAULT_TIME);
}

async function toggleType(id){
  const a=appointments.find(x=>x.id===id);if(!a)return;
  await sb.from('appointments').update({type:a.type==='new'?'return':'new'}).eq('id',id);
  showToast('已更新類型');_invalidateCache();await loadData();
}
async function cancelAppt(id){
  const a=appointments.find(x=>x.id===id);
  // 一小時=兩格(兩筆)；找出「同一筆預約的所有連續格子」一起取消，不用按兩次
  let ids=[id];
  if(a){
    try{
      const sameDay=appointments.filter(x=>x.appointment_date===a.appointment_date&&x.status!=='cancelled');
      const grp=groupConsecutiveAppts(sameDay).find(g=>g.some(x=>x.id===id));
      if(grp&&grp.length) ids=grp.map(x=>x.id);
    }catch(e){}
  }
  const n=ids.length;
  if(!confirm(n>1?`這筆預約共 ${n} 個時段（${a?a.appointment_time.slice(0,5):''} 起），確定要全部取消嗎？`:'確定要取消這個預約嗎？'))return;
  await sb.from('appointments').update({status:'cancelled'}).in('id',ids);
  showToast(n>1?`已取消預約（${n} 個時段）`:'已取消預約');_invalidateCache();await loadData();
}
async function restoreAppt(id){
  await sb.from('appointments').update({status:'confirmed'}).eq('id',id);
  showToast('已恢復預約');_invalidateCache();await loadData();
}

/* ── 活動功能 ── */
function _genEventId(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }

let _evCalY=new Date().getFullYear(), _evCalM=new Date().getMonth();
let _evSelY=new Date().getFullYear(), _evSelM=new Date().getMonth(), _evSelD=new Date().getDate();

// 新增預約的行事曆狀態
let _naCalY=new Date().getFullYear(), _naCalM=new Date().getMonth();
let _naSelY=new Date().getFullYear(), _naSelM=new Date().getMonth(), _naSelD=new Date().getDate();

function openNewEvent(){
  window._evTimes=[];
  window._evThs=[];
  const n=new Date();
  _evCalY=n.getFullYear();_evCalM=n.getMonth();
  _evSelY=n.getFullYear();_evSelM=n.getMonth();_evSelD=n.getDate();
  _renderEventModal();
}

function _renderEventModal(){
  const todayStr=fmtDate(new Date());
  const selStr=`${_evSelY}-${String(_evSelM+1).padStart(2,'0')}-${String(_evSelD).padStart(2,'0')}`;
  const first=new Date(_evCalY,_evCalM,1).getDay();
  const dim=new Date(_evCalY,_evCalM+1,0).getDate();
  let cal=DAYS.map(d=>`<div style="text-align:center;font-size:11px;color:var(--muted);font-weight:300;padding:3px 0">${d}</div>`).join('');
  cal+=Array(first).fill('<div></div>').join('');
  cal+=Array.from({length:dim},(_,i)=>{
    const d=new Date(_evCalY,_evCalM,i+1);
    const ds=fmtDate(d);
    const isSel=ds===selStr;const isToday=ds===todayStr;const isSun=d.getDay()===0;
    const lb=lunarLabel(d);
    return `<div onclick="evPickDay(${_evCalY},${_evCalM},${i+1})" style="text-align:center;padding:5px 2px;cursor:pointer;background:${isSel?'var(--warm)':'transparent'};border:1px solid ${isSel?'var(--warm)':'transparent'}">
      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;color:${isSel?'#f3ede1':isToday?'var(--warm)':isSun?'var(--new-color)':'var(--text)'}">${i+1}</div>
      ${lb.lunar?`<div style="font-size:9px;color:${isSel?'rgba(243,237,225,.8)':lb.hot?'var(--warm)':'var(--muted)'};margin-top:1px">${lb.lunar}</div>`:'<div style="font-size:9px"> </div>'}
      ${lb.holiday?`<div style="font-size:8px;color:${isSel?'rgba(243,237,225,.9)':'var(--warm)'}">${lb.holiday}</div>`:''}
    </div>`;
  }).join('');

  // 儲存當前 title/note 值
  const titleVal=document.getElementById('ev-title')?.value||'';
  const noteVal=document.getElementById('ev-note')?.value||'';

  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="guardedCloseModal()">
    <div class="modal" onclick="event.stopPropagation()" style="max-height:90vh;overflow-y:auto">
      <div class="modal-handle"></div>
      <p class="modal-title">新增活動/休診</p>

      <div style="margin-bottom:14px">
        <label class="field-lbl">活動名稱 *</label>
        <input id="ev-title" style="${fieldBox()}" placeholder="例如：員工會議、公休" value="${titleVal}">
      </div>

      <!-- 行事曆選日期 -->
      <label class="field-lbl">日期 *</label>
      <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <button onclick="_evCalPrev()" class="nav-btn">‹</button>
          <span style="font-family:'Cormorant Garamond',serif;font-size:16px">${_evCalY} 年 ${_evCalM+1} 月</span>
          <button onclick="_evCalNext()" class="nav-btn">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cal}</div>
        <p style="margin-top:10px;font-size:11px;color:var(--warm);text-align:center;font-weight:300">
          已選：${selStr}
        </p>
      </div>

      <!-- 時段 -->
      <label class="field-lbl">封鎖時段 *</label>
      <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button onclick="evSelectAllTimes()" style="padding:5px 12px;border:1px solid var(--warm);background:var(--warm);color:#f3ede1;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif">全選</button>
          <button onclick="evClearTimes()" style="padding:5px 12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif">清除</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px" id="ev-times-wrap">
          ${TIMES.map(t=>`<div onclick="evToggleTime('${t}')" id="ev-t-${t.replace(':','-')}" style="${partTagStyle(window._evTimes.includes(t))}">${t}</div>`).join('')}
        </div>
      </div>

      <!-- 治療師 -->
      <label class="field-lbl">影響治療師</label>
      <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <div onclick="evToggleTh('all')" id="ev-th-all" style="${partTagStyle(window._evThs.includes('all'))}">全部</div>
          ${therapists.map(t=>`<div onclick="evToggleTh(${t.id})" id="ev-th-${t.id}" style="${partTagStyle(window._evThs.includes('all')||window._evThs.includes(t.id))}">${t.name}</div>`).join('')}
        </div>
      </div>

      <div style="margin-bottom:14px">
        <label class="field-lbl">備註（選填）</label>
        <input id="ev-note" style="${fieldBox()}" placeholder="" value="${noteVal}">
      </div>

      <div class="modal-btns">
        <button class="mBtn" onclick="closeModal()">取消</button>
        <button class="mBtn primary" onclick="submitNewEvent()">新增活動</button>
      </div>
    </div>
  </div>`;
}

function _renderNaCal(){
  const todayStr=fmtDate(new Date());
  const selStr=`${_naSelY}-${String(_naSelM+1).padStart(2,'0')}-${String(_naSelD).padStart(2,'0')}`;
  const first=new Date(_naCalY,_naCalM,1).getDay();
  const dim=new Date(_naCalY,_naCalM+1,0).getDate();
  let cal=DAYS.map(d=>`<div style="text-align:center;font-size:11px;color:var(--muted);font-weight:300;padding:3px 0">${d}</div>`).join('');
  cal+=Array(first).fill('<div></div>').join('');
  cal+=Array.from({length:dim},(_,i)=>{
    const d=new Date(_naCalY,_naCalM,i+1);
    const ds=fmtDate(d);
    const isSel=ds===selStr;const isToday=ds===todayStr;const isSun=d.getDay()===0;
    const lb=lunarLabel(d);
    return `<div onclick="naDayPick(${_naCalY},${_naCalM},${i+1})" style="text-align:center;padding:5px 2px;cursor:pointer;background:${isSel?'var(--warm)':'transparent'};border:1px solid ${isSel?'var(--warm)':'transparent'}">
      <div style="font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:${isSel?500:400};color:${isSel?'#f3ede1':isToday?'var(--warm)':isSun?'var(--new-color)':'var(--text)'}">${i+1}</div>
      ${lb.lunar?`<div style="font-size:9px;color:${isSel?'rgba(243,237,225,.8)':lb.hot?'var(--warm)':'var(--muted)'};margin-top:1px">${lb.lunar}</div>`:'<div style="font-size:9px"> </div>'}
      ${lb.holiday?`<div style="font-size:8px;color:${isSel?'rgba(243,237,225,.9)':'var(--warm)'}">${lb.holiday}</div>`:''}
    </div>`;
  }).join('');
  const wrap=document.getElementById('na-cal-wrap');
  if(!wrap)return;
  wrap.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="_naCalPrev()" class="nav-btn">‹</button>
      <span style="font-family:'Cormorant Garamond',serif;font-size:15px">${_naCalY} 年 ${_naCalM+1} 月</span>
      <button onclick="_naCalNext()" class="nav-btn">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cal}</div>
    <p style="margin-top:8px;font-size:11px;color:var(--warm);text-align:center;font-weight:300">已選：${selStr}</p>`;
}
function _naCalPrev(){_naCalM--;if(_naCalM<0){_naCalM=11;_naCalY--;}_renderNaCal();}
function _naCalNext(){_naCalM++;if(_naCalM>11){_naCalM=0;_naCalY++;}_renderNaCal();}
function naDayPick(y,m,d){
  _naSelY=y;_naSelM=m;_naSelD=d;_renderNaCal();
  // 點日期 → 自動跳出那天的時間軸（已開著就更新）
  const p=document.getElementById('na-daytl');
  if(p && getComputedStyle(p).display==='none') toggleDayTimeline();
  else renderDayTimeline();
}

function openNewEventOn(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  _evCalY=d.getFullYear();_evCalM=d.getMonth();
  _evSelY=d.getFullYear();_evSelM=d.getMonth();_evSelD=d.getDate();
  window._evTimes=[];window._evThs=[];
  _renderEventModal();
}
function _evCalPrev(){_evCalM--;if(_evCalM<0){_evCalM=11;_evCalY--;}_renderEventModal();}
function _evCalNext(){_evCalM++;if(_evCalM>11){_evCalM=0;_evCalY++;}_renderEventModal();}
function evPickDay(y,m,d){_evSelY=y;_evSelM=m;_evSelD=d;_renderEventModal();}

function evToggleTime(t){
  const key=t.replace(':','-');
  const idx=window._evTimes.indexOf(t);
  if(idx>=0)window._evTimes.splice(idx,1);else window._evTimes.push(t);
  document.getElementById('ev-t-'+key).style.cssText=partTagStyle(window._evTimes.includes(t));
}
function evSelectAllTimes(){
  window._evTimes=[...TIMES];
  TIMES.forEach(t=>{document.getElementById('ev-t-'+t.replace(':','-')).style.cssText=partTagStyle(true);});
}
function evClearTimes(){
  window._evTimes=[];
  TIMES.forEach(t=>{document.getElementById('ev-t-'+t.replace(':','-')).style.cssText=partTagStyle(false);});
}
function evToggleTh(id){
  if(id==='all'){
    window._evThs=window._evThs.includes('all')?[]:['all'];    // 按全部=四位自動反白;再按=清空
  } else if(window._evThs.includes('all')){
    window._evThs=therapists.map(t=>t.id).filter(x=>x!==id);   // 全亮時點某人=把他熄掉,其餘保留
  } else {
    const idx=window._evThs.indexOf(id);
    if(idx>=0)window._evThs.splice(idx,1);else window._evThs.push(id);       // 點誰亮誰
    if(window._evThs.length===therapists.length)window._evThs=['all'];       // 四位點滿=等於全部
  }
  const isAll=window._evThs.includes('all');
  document.getElementById('ev-th-all').style.cssText=partTagStyle(isAll);
  therapists.forEach(t=>{document.getElementById('ev-th-'+t.id).style.cssText=partTagStyle(isAll||window._evThs.includes(t.id));});
}

async function submitNewEvent(){
  const title=document.getElementById('ev-title').value.trim();
  const date=`${_evSelY}-${String(_evSelM+1).padStart(2,'0')}-${String(_evSelD).padStart(2,'0')}`;
  const note=document.getElementById('ev-note').value.trim();
  if(!title||!date||!window._evTimes.length){showToast('請填寫名稱並選擇時段');return;}
  if(!window._evThs.length){showToast('請選擇影響治療師（或按「全部」）');return;}
  const eventId=_genEventId();
  const isAll=window._evThs.includes('all');
  const thIds=isAll?[null]:window._evThs;
  const rows=[];
  for(const t of window._evTimes){
    for(const thId of thIds){
      rows.push({
        therapist_id:thId,
        patient_name:title,
        patient_phone:'',
        appointment_date:date,
        appointment_time:t+':00',
        type:'new',
        service:note||'',
        symptoms:'',
        note:`event:${eventId}`,
        status:'confirmed',
        line_user_id:null,
        therapist_name:isAll?'全部':(therapists.find(x=>x.id===thId)?.name||null)
      });
    }
  }
  const{error}=await sb.from('appointments').insert(rows);
  if(error){showToast('新增失敗：'+error.message);return;}
  closeModal();showToast('活動已新增');_invalidateCache();await loadData();
}

async function deleteEvent(id){
  const a=appointments.find(x=>x.id===id);
  if(!a)return;
  if(!confirm('確定刪除此活動？所有相關時段都會一併移除'))return;
  const m=(a.note||'').match(/event:(\w+)/);
  let error;
  if(m){
    ({error}=await sb.from('appointments').update({status:'cancelled'}).like('note',`event:${m[1]}%`));
  } else {
    ({error}=await sb.from('appointments').update({status:'cancelled'}).eq('id',id));
  }
  if(error){showToast('刪除失敗：'+error.message);return;}
  closeModal();showToast('活動已刪除');_invalidateCache();await loadData();
}

  }
})();
